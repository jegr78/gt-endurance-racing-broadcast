# Gitleaks config for the Secret scan workflow (.github/workflows/gitleaks.yml).
# Keeps the full default ruleset and only allowlists known-fake, publicly
# documented test vectors. Add new entries here ONLY for values that are
# provably not secrets (spec examples, dummy-password derivations).

[extend]
useDefault = true

# tests/test_obsws.py uses public protocol test vectors that trip the
# generic-api-key rule (high-entropy base64):
#   - "the sample nonce" key/accept pair from RFC 6455 section 1.3
#   - obs-websocket v5 auth salt/challenge doc examples and the token
#     derived from them with the dummy password "supersecret"
[[allowlists]]
description = "Public WebSocket/obs-websocket test vectors in tests/test_obsws.py"
condition = "AND"
paths = ['''tests/test_obsws\.py''']
regexes = [
  '''dGhlIHNhbXBsZSBub25jZQ==''',
  '''lM1GncleQOaCu9lT1yeUZhFYnqhsLLP1G5lAGo3ixaI=''',
  '''ztTBnnuqrqaKDzRM3xcVdbYm''',
  '''1CHyRqIyanJT0eSP/mfMQR1AWZ9KgFl5l6/rPs76VDE=''',
]

# The e2e harness mints a cockpit token from a fixed, obviously-fake secret so
# the synthetic run is self-consistent. It is a test fixture, not a real secret
# (the real COCKPIT_SECRET is per-league and generated by `cockpit enable`). The
# same literal appears in the harness's design plan doc.
[[allowlists]]
description = "Synthetic cockpit-secret fixture in the e2e harness (not a real secret)"
condition = "AND"
regexTarget = "line"
paths = [
  '''tools/e2e\.py''',
  '''docs/superpowers/plans/2026-06-17-e2e-regression-harness\.md''',
]
regexes = [
  '''e2e-secret-0123456789abcdef''',
  '''RACECAST_COCKPIT_SECRET=secret''',
]

# tests/test_broadcast_chat.py's parse_bootstrap fixture is a fragment of a fake
# YouTube live_chat page; its dummy INNERTUBE_API_KEY ("AIza…TESTKEY…") trips the
# generic/Google API-key rule. It is an invented test vector, not a real key (a
# real one is never committed — the relay reads it live from YouTube at runtime).
[[allowlists]]
description = "Fake Innertube API key in the broadcast-chat bootstrap test fixture (#294)"
condition = "AND"
paths = ['''tests/test_broadcast_chat\.py''']
regexes = [
  '''AIzaTESTKEY123''',
]

# The /console/buttons WebSocket-passthrough tests reuse the same RFC 6455
# section 1.3 "sample nonce" Sec-WebSocket-Key as test_obsws.py — the relay and
# the raw-socket stub never validate it, so the value is arbitrary. The same
# literal appears in the feature's plan doc (#236).
[[allowlists]]
description = "Public RFC 6455 sample WebSocket key in the /console/buttons WS tests + plan (#236)"
condition = "AND"
paths = [
  '''tests/test_console_gate\.py''',
  '''docs/superpowers/plans/2026-06-19-companion-buttons-funnel\.md''',
]
regexes = [
  '''dGhlIHNhbXBsZSBub25jZQ==''',
]
