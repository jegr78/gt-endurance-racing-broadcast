<!doctype html>
<html lang="en">
<head>
<script>
  // /console base-path shim (#216). The server replaces __RC_API_BASE__ with the
  // active mount ("/console" behind Funnel, "" at the tailnet/loopback root).
  // Patches fetch and exposes RC_API() so same-origin API calls resolve under the
  // mount; a no-op when the base is empty.
  window.RC_API_BASE = "__RC_API_BASE__";
  window.RC_API = function (p) {
    var b = window.RC_API_BASE || "";
    if (!b || typeof p !== "string" || p.charAt(0) !== "/") return p;
    if (p.indexOf(b + "/") === 0 || p === b) return p;   // already prefixed
    return b + p;
  };
  (function () {
    var _f = window.fetch;
    window.fetch = function (u, o) { return _f(window.RC_API(u), o); };
  })();
</script>

<title>Race Control</title>
<!-- Inline "R" favicon drawn as a path so it renders without a font; dark tile +
     live-green letter to match the console "C" / panel "D" / cockpit theme. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0c0f'/%3E%3Cpath d='M11 24V8h6.2a4.4 4.4 0 0 1 0 8.8H11m6 0 4.6 7.2' fill='none' stroke='%232bd66a' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.4 system-ui, sans-serif; background: #0b0d10; color: #e8eaed; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #14171c; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  a.back { display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
           color: #e8eaed; background: #1b1f25; border: 1px solid #232830; border-radius: 8px;

  .appmeta { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .appmeta a { display: inline-flex; align-items: center; gap: 5px; text-decoration: none;

  .appmeta a:hover { border-color: #3da9fc; }
  .appmeta .ver { color: #ffb454; font-variant-numeric: tabular-nums; }
  .wrap { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 12px; }
  /* Grid items default to min-width:auto, so a long unbreakable chat token (e.g. a
     Twitch username/URL) would blow the 1fr column past its track and squeeze the

  .wrap > div { min-width: 0; }
  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
  .card { background: #14171c; border: 1px solid #232830; border-radius: 10px; overflow: hidden; }
  /* On-air banner — a prominent restatement of the live stint/streamer at the top

  .tally { margin: 12px; padding: 18px; text-align: center; font-weight: 800; font-size: 26px;

  .tally .sub  { font-size: 14px; font-weight: 600; opacity: .9; margin-top: 6px; }
  #program { width: 100%; display: block; background: #000; aspect-ratio: 16/9; object-fit: contain; }
  .progwrap { position: relative; }
  .progwrap .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6);

  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; opacity: .7;
       margin: 0; padding: 10px 12px; border-bottom: 1px solid #232830; }
  /* --- Schedule table --- */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #1c2027; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; opacity: .6; }

  #schedEmpty { padding: 14px 12px; opacity: .6; font-size: 13px; }
  #schedEmpty:not(:empty) + table { display: none; }
  /* --- Chat --- */
  #chat { display: flex; flex-direction: column; height: 300px; }
  #chatlog { flex: 1; overflow-y: auto; padding: 8px 10px; }
  #chatlog .msg { margin-bottom: 6px; overflow-wrap: anywhere; }

  #chatlog .ts, #bchatlog .ts { color: #5f6772; font-size: 10px; margin-right: 5px;

  #bchat { display: flex; flex-direction: column; height: 280px; }
  #bchatlog { flex: 1; overflow-y: auto; padding: 8px 10px; }

  #bchatlog .src { font-size: 10px; color: #8a929c; margin-left: 6px; }
  #bchatlog .emote { height: 1.25em; width: auto; vertical-align: -0.25em; margin: 0 1px; }
  .bcompose { float: right; font: inherit; font-size: 11px; line-height: 1.4;
    padding: 2px 8px; border: 1px solid #3a4250; border-radius: 5px;

  .chatbar { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #232830; }

  .rcsend { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
  .rcsend select, .rcsend input { width: 100%; padding: 8px; background: #0b0d10;
    color: #e8eaed; border: 1px solid #2a3038; border-radius: 6px; font: inherit; }
  .rcrow { display: flex; gap: 6px; }
  .rcrow input { flex: 1; }

  .rcrow button:hover { background: #c2620a; }
  .rcrow button:disabled { opacity: .5; cursor: default; }
  .rcpresets { display: flex; flex-wrap: wrap; gap: 6px; }
  .rcpresets button { font: inherit; font-size: 12px; padding: 4px 9px; cursor: pointer;

  .rcpresets button:hover { background: #2a323d; border-color: #b45309; }
  .rcpresets:empty { display: none; }
  .rcmsg { font-size: 12px; min-height: 14px; }
  .rcmsg.ok { color: #2bd66a; }
  .rcmsg.err { color: #ff6b6b; }
  .notesbtn { font: inherit; cursor: pointer; background: transparent;

  .notesmodal { max-width: 560px; width: 90vw; border: none; border-radius: 10px;

  .notesmodal h3 { margin: 0 0 12px; }

  .noteitem.important { border-left-color: #f5a623; }

  .notesactions button { font: inherit; cursor: pointer; padding: 6px 14px;

  .notesactions button:hover { background: #2a323d; border-color: #3b82f6; }
</style>

<script>
const $ = (id) => document.getElementById(id);

// The auth cookie was set by the response that served this page, so the token in
// the URL is no longer needed — strip it from the address bar + history.
if (location.search) {
  try { history.replaceState({}, '', location.pathname); } catch (e) { /* noop */ }
}

async function j(path) {
  const r = await fetch(path, { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
// Local HH:MM:SS from a server ts (seconds). Empty for a missing/invalid ts.
function fmtTs(ts) {
  if (typeof ts !== 'number' || !isFinite(ts)) return '';
  try { return new Date(ts * 1000).toLocaleTimeString(); } catch (e) { return ''; }
}
// True when a scroll container is at (or near) its bottom — so we only
// auto-scroll on new messages when the reader hasn't scrolled up to read back.
function atBottom(el) { return el.scrollHeight - el.scrollTop - el.clientHeight < 24; }
// Platform-aware source label for the handover overlap badge: "TW:<login>" for
// Twitch (source "twitch:<login>"), "YT:<last4>" for a YouTube videoId.
function srcBadge(source) {
  const s = String(source || '');
  return s.indexOf('twitch:') === 0 ? 'TW:' + s.slice(7) : 'YT:' + s.slice(-4);
}

// --- On-air banner: prominent live stint/streamer (mirrors the cockpit tally) ---
function renderOnAir(o) {
  const el = $('tally');
  el.textContent = '';
  if (o && (o.streamer || o.stint)) {
    el.className = 'tally onair';
    const pill = document.createElement('span');
    pill.className = 'pill'; pill.textContent = 'ON AIR';
    el.appendChild(pill);
    el.appendChild(document.createTextNode(o.streamer || '—'));   // XSS-safe
    if (o.stint) {
      const sub = document.createElement('div');
      sub.className = 'sub'; sub.textContent = o.stint;            // e.g. "Stint 4"
      el.appendChild(sub);
    }
  } else {
    el.className = 'tally idle';
    el.textContent = 'No stint on air';
  }
}

// --- Redacted schedule (no stream URLs) + on-air marker ---
function renderSchedule(d) {
  renderOnAir(d.on_air);
  const title = (d.event_title || '').trim();
  $('eventTitle').textContent = title;
  document.title = title ? (title + ' · Race Control') : 'Race Control';
  $('who').textContent = d.mode === 'qualifying' ? '· QUALI' : '';
  const rows = d.schedule || [];
  const body = $('schedRows');
  body.textContent = '';
  rows.forEach(s => {
    const tr = document.createElement('tr');
    if (s.live) tr.className = 'onair';
    const st = document.createElement('td'); st.textContent = s.stint || '';
    const nm = document.createElement('td'); nm.textContent = s.streamer || '';  // XSS-safe
    const lv = document.createElement('td');
    if (s.live) {
      const tag = document.createElement('span');
      tag.className = 'live'; tag.textContent = 'ON AIR';
      lv.appendChild(tag);
      const f = document.createElement('span');
      f.className = 'feed'; f.textContent = ' ' + s.live;
      lv.appendChild(f);
    }
    tr.append(st, nm, lv);
    body.appendChild(tr);
  });
  $('schedEmpty').textContent = rows.length ? '' : 'No stints scheduled yet.';
  rebuildTargets(rows.map(s => s.streamer));      // keep the note composer in sync
}
async function pollSchedule() {
  try { renderSchedule(await j('/race-control/data')); }
  catch (e) { /* transient */ }
  setTimeout(pollSchedule, 3000);
}

// --- Note to commentator (#376): the desk's one write action ---
// A short heads-up to the on-air commentator / all commentators / a specific person
// (jump-to-driver, DC/rejoin, retired). It is stored server-side as an RC note
// and shown in that commentator's cockpit "Race Control" card — never a penalty
// or flag (no live stewarding in GT7), just a text heads-up.
let _targetSig = '';
function rebuildTargets(streamers) {
  // Rebuild the dropdown only when the streamer set changes, so the 3 s schedule
  // poll never resets the operator's current selection.
  const uniq = [...new Set((streamers || []).filter(Boolean))];
  const sig = uniq.join('|');
  if (sig === _targetSig) return;
  _targetSig = sig;
  const sel = $('rcTarget'), prev = sel.value;
  sel.textContent = '';
  const add = (v, label) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = label;          // XSS-safe
    sel.appendChild(o);
  };
  add('on-air', 'On air');
  add('all', 'All commentators');
  uniq.forEach(s => add(s, s));   // value is the display name; the server normalizes it
  if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
}
async function loadRcPresets() {
  let presets = [];
  try { presets = (await j('/race-control/presets')).presets || []; }
  catch (e) { /* none configured / transient */ }
  const box = $('rcPresets');
  box.textContent = '';
  presets.forEach(p => {
    const b = document.createElement('button');
    b.type = 'button'; b.textContent = p;        // XSS-safe (Sheet value)
    b.addEventListener('click', () => { const t = $('rcText'); t.value = p; t.focus(); });
    box.appendChild(b);
  });
}
async function sendRcNote() {
  const sel = $('rcTarget'), inp = $('rcText'), btn = $('rcSend'), msg = $('rcMsg');
  const text = inp.value.trim();
  if (!text) return;
  btn.disabled = true; msg.className = 'rcmsg'; msg.textContent = '';
  try {
    const r = await fetch('/race-control/cues', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: sel.value, text }) });
    const d = await r.json().catch(() => ({}));
    if (r.ok && d.ok) {
      inp.value = '';
      msg.className = 'rcmsg ok'; msg.textContent = 'Sent.';
      setTimeout(() => { if (msg.textContent === 'Sent.') { msg.textContent = ''; msg.className = 'rcmsg'; } }, 2500);
    } else {
      msg.className = 'rcmsg err';
      msg.textContent = (d && d.error) ? d.error : ('Failed (' + r.status + ')');
    }
  } catch (e) {
    msg.className = 'rcmsg err'; msg.textContent = 'Network error.';
  } finally { btn.disabled = false; }
}
$('rcSend').addEventListener('click', sendRcNote);
$('rcText').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendRcNote(); });

// --- Program monitor (JPEG stills, cache-busted) — reuses the cockpit endpoint ---
function pollProgram() {
  const img = $('program');
  const next = new Image();
  next.onload = () => { img.src = next.src; setTimeout(pollProgram, 1500); };
  next.onerror = () => setTimeout(pollProgram, 3000);
  next.src = RC_API('/cockpit/program') + '?_=' + Date.now();
}

// --- On-air program audio (hidden until probed available; default muted) ---
function pgmAudioInit(endpoint) {
  var bar = document.getElementById('pgmAudioBar');
  var btn = document.getElementById('pgmAudioBtn');
  var vol = document.getElementById('pgmAudioVol');
  var au  = document.getElementById('pgmAudio');
  if (!bar || !btn || !au) return;
  var url = RC_API(endpoint);
  // Probe: show the control only if the endpoint exists (feature on + fan-out on).
  fetch(url, { method: 'HEAD' }).then(function (r) {
    if (r.status === 404) return;            // disabled -> stay hidden
    bar.style.display = 'flex';
  }).catch(function () { /* leave hidden */ });
  au.volume = parseFloat(vol.value);
  vol.addEventListener('input', function () { au.volume = parseFloat(vol.value); });
  var on = false;
  btn.addEventListener('click', function () {
    on = !on;
    if (on) {
      au.src = url + (url.indexOf('?') < 0 ? '?' : '&') + 'ts=' + Date.now();
      au.play().catch(function () { on = false; setBtn(); });  // gesture satisfies autoplay
    } else {
      au.pause(); au.removeAttribute('src'); au.load();        // drop the connection -> relay reaps encoder
    }
    setBtn();
  });
  function setBtn() {
    btn.textContent = (on ? '🔊' : '🔇') + ' Audio';
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  }
}

// --- Timer (mirrors the broadcast HUD clock) — reuses the cockpit endpoint ---
let timerState = null, clockOffset = 0;
function fmtClock(s) {
  s = Math.max(0, Math.ceil(s));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), x = s % 60;
  return `${h}:${String(m).padStart(2, '0')}:${String(x).padStart(2, '0')}`;
}
function renderTimer() {
  const el = $('timer').querySelector('.t');
  if (!timerState || !timerState.visible) { el.textContent = '—'; return; }
  if (timerState.end === null) {
    const s = (timerState.remaining_s ?? null) !== null ? timerState.remaining_s
                                                        : timerState.duration_s;
    el.textContent = fmtClock(s);
  } else {
    const remaining = timerState.end - (Date.now() / 1000 + clockOffset);
    el.textContent = remaining > 0 ? fmtClock(remaining) : '0:00:00';
  }
}
async function pollTimer() {
  try {
    const d = await j('/cockpit/timer');
    if (!d.error) { timerState = d; clockOffset = d.server_now - Date.now() / 1000; }
  } catch (e) { /* keep last good state on transient errors */ }
  setTimeout(pollTimer, 5000);
}
setInterval(renderTimer, 250);

// --- Chat (identity forced server-side from the token) — reuses the cockpit endpoints ---
async function pollChat() {
  try {
    const d = await j('/cockpit/chat/data');
    const log = $('chatlog');
    const stick = atBottom(log);            // only auto-scroll if already at the bottom
    log.textContent = '';
    (d.messages || []).forEach(msg => {
      const row = document.createElement('div');
      row.className = 'msg';
      const t = document.createElement('span');
      t.className = 'ts'; t.textContent = fmtTs(msg.ts);
      const u = document.createElement('span');
      u.className = 'u'; u.textContent = (msg.user || 'Crew') + ': ';
      row.appendChild(t); row.appendChild(u);
      row.appendChild(document.createTextNode(msg.text || ''));  // XSS-safe

// --- Broadcast chat (#294): read-only mirror of the public stream chat ---
function bchatBody(row, msg) {
  // Render an image-emote message (#351): text nodes + <img> emotes, no innerHTML.
  // Falls back to the flat text when no tokens are present or an emote fails to load.
  const toks = Array.isArray(msg.tokens) ? msg.tokens : null;
  if (!toks) { row.appendChild(document.createTextNode(msg.text || '')); return; }
  toks.forEach(tk => {
    if (tk && tk.t === 'emote' && typeof tk.url === 'string') {
      const img = document.createElement('img');
      img.className = 'emote'; img.src = tk.url; img.alt = tk.alt || ''; img.loading = 'lazy';
      img.onerror = () => img.replaceWith(document.createTextNode(tk.alt || ''));
      row.appendChild(img);
    } else if (tk && tk.t === 'text') {
      row.appendChild(document.createTextNode(tk.v || ''));
    }
  });
}
function bchatUrlOk(url, platform) {
  // Defense-in-depth (mirrors emote_url_ok): only https on the expected
  // platform host reaches window.open — rejects javascript:/data: and
  // off-platform hosts even though target.url is server-built.
  try {
    const u = new URL(url);
    if (u.protocol !== 'https:') return false;
    const host = u.hostname.toLowerCase();
    const dom = platform === 'twitch' ? 'twitch.tv' : 'youtube.com';
    return host === dom || host.endsWith('.' + dom);
  } catch (_) { return false; }
}
function bchatTarget(target) {

  const plat = target.platform === 'twitch' ? 'Twitch' : 'YouTube';
  btn.textContent = '✍ Write in ' + plat + ' chat ↗';
  btn.hidden = false;
  btn.onclick = (e) => {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const w = window.open(target.url, 'rc_broadcast_chat',

}
function renderBroadcastChat(msgs) {

    log.appendChild(e);

  const multi = new Set(msgs.map(m => m.source)).size > 1;   // handover overlap

    row.appendChild(t); row.appendChild(u);

    if (multi && msg.source) {

}
