<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GT Endurance Racing HUD</title>
<style>
  /* Positions match the old per-cell OBS browser sources 1:1 (align = top-left,
     canvas 1920x1080). The Overlay.png frame stays its own OBS source; this page
     only renders the text/flag/brand that used to be the 13 chroma-keyed sheet
     sources. Tweak coordinates here to fine-tune live. */
  html, body { margin: 0; width: 1920px; height: 1080px;
    background: transparent; overflow: hidden;
    font-family: "Arial Narrow", "Arial", sans-serif; }
  .el { position: absolute; display: flex; align-items: center;
    overflow: hidden; white-space: nowrap; box-sizing: border-box;
    font-weight: 700; line-height: 1; }
  .el.empty { display: none; }
  .white { color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,.55); }
  .black { color: #111111; }

  /* Top red banner */
  #stint { left: 774px; top: 26px; width: 375px; height: 65px;
    justify-content: center; font-size: 40px; letter-spacing: 1px; }

  /* Lower-third left block: session above streamer */
  #session  { left: 733px; top: 921px; width: 265px; height: 40px;
    font-size: 26px; font-style: italic; }
  #streamer { left: 738px; top: 957px; width: 265px; height: 50px;
    font-size: 32px; }

  /* Lower-third round block: title, flag, country */
  #round-top     { left: 1043px; top: 919px; width: 557px; height: 37px;
    font-size: 24px; font-style: italic; }
  #round-flag    { left: 1049px; top: 957px; width: 99px;  height: 40px; }
  #round-flag img { height: 38px; width: auto; max-width: 99px; object-fit: contain;
    box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  #round-country { left: 1144px; top: 958px; width: 548px; height: 39px;
    font-size: 26px; }

  /* Team podium row: each car is THREE independently positionable slots —
     brand logo, number badge, auto-fit name (issue #136). The overlay builder
     can place/restyle each on its own; --team-name-max/min bound the auto-fit. */
  .team-logo { height: 50px; width: 54px; }
  .team-logo img { width: 100%; height: 100%; object-fit: contain; }
  .team-num { height: 56px; background: #c8202a; color: #fff;
    font-size: 20px; padding: 2px 9px; border-radius: 3px; }
  .team-name { height: 56px; --team-name-max: 30px; --team-name-min: 16px;
    overflow: hidden; white-space: nowrap; font-size: var(--team-name-max); }
  /* Defaults reproduce the old single-row look: logo, then badge, then name. */
  #team1-logo { left: 323px; top: 1008px; }
  #team1-num  { left: 387px; top: 1005px; }
  #team1-name { left: 455px; top: 1005px; width: 250px; }
  #team2-logo { left: 766px; top: 1008px; }
  #team2-num  { left: 830px; top: 1005px; }
  #team2-name { left: 898px; top: 1005px; width: 247px; }
  #team3-logo { left: 1210px; top: 1008px; }
  #team3-num  { left: 1274px; top: 1005px; }
  #team3-name { left: 1342px; top: 1005px; width: 248px; }

  /* POV picture-in-picture frame (issue #141): aligned to the OBS "Feed POV"
     scene item (pos 1496,644, bounds 384x216). Transparent by default — set a
     background/border in the overlay builder to frame the PiP on air. */
  #pov { left: 1496px; top: 644px; width: 384px; height: 216px; }

  /* POV name label — top-right of the POV frame, splitscreen-label look (#130).
     A normal builder box (left/top/width/height + text props); grey-pill look is
     the default fill. Shown only while the POV feed is on air (see tick()). */
  #pov-name { left: 1592px; top: 618px; width: 288px; height: 38px;
    justify-content: flex-end;
    background: rgba(38,44,52,.92); border: 1px solid #4a5560; border-radius: 7px;
    padding: 0 12px; color: #fff;
    font-family: "IBM Plex Mono", ui-monospace, monospace;
    font-weight: 600; font-size: 22px; letter-spacing: .04em; }

  /* Race-timer clock, merged in from the old separate timer source. Sits at the
     top band at the clock's true on-air size/position (was OBS crop y[217..895]
     + scale 0.0854 + pos 880,98). Tune live via the builder. */
  #clock { left: 889px; top: 98px; height: 58px;
    display: flex; align-items: center; white-space: nowrap;
    font-family: "SF Mono", "Cascadia Mono", "Consolas", "Menlo", monospace;
    font-weight: 700; font-size: 36px; color: #ffffff;
    text-shadow: 0 2px 6px rgba(0,0,0,.6); font-variant-numeric: tabular-nums; }

  /* Race control banner (status line, hidden when empty). Gray band flush
     with the lower-third block of the Overlay.png frame: x 264..1593 and
     #4b565c both measured from the graphic (team name bars). */
  #race-control { left: 264px; top: 864px; width: 1329px; height: 55px;
    font-size: 34px; background: #4b565c; padding-left: 14px; }
</style>
<link rel="stylesheet" href="/hud/override.css">
</head>
<body>
  <!-- data-edit="<label>" marks a builder slot; data-edit-kind="text|box" sets
       its property set (KIND_PROPS in overlay_build.py — the single source).
       data-edit-props adds slot-specific extras (e.g. team-name auto-fit). -->
  <div id="stint" class="el white" data-edit="Stint banner" data-edit-kind="text"></div>
  <div id="session" class="el black" data-edit="Session" data-edit-kind="text"></div>
  <div id="streamer" class="el black" data-edit="Streamer" data-edit-kind="text"></div>
  <div id="round-top" class="el white" data-edit="Round title" data-edit-kind="text"></div>
  <div id="round-flag" class="el" data-edit="Round flag" data-edit-kind="box"><img alt=""></div>
  <div id="round-country" class="el white" data-edit="Round country" data-edit-kind="text"></div>
  <div id="team1-logo" class="el team-logo" data-edit="Team 1 logo" data-edit-kind="box"><img alt=""></div>
  <div id="team1-num" class="el team-num white" data-edit="Team 1 number" data-edit-kind="text"></div>
  <div id="team1-name" class="el team-name white" data-edit="Team 1 name" data-edit-kind="text" data-edit-props="teamNameMax,teamNameMin"></div>
  <div id="team2-logo" class="el team-logo" data-edit="Team 2 logo" data-edit-kind="box"><img alt=""></div>
  <div id="team2-num" class="el team-num white" data-edit="Team 2 number" data-edit-kind="text"></div>
  <div id="team2-name" class="el team-name white" data-edit="Team 2 name" data-edit-kind="text" data-edit-props="teamNameMax,teamNameMin"></div>
  <div id="team3-logo" class="el team-logo" data-edit="Team 3 logo" data-edit-kind="box"><img alt=""></div>
  <div id="team3-num" class="el team-num white" data-edit="Team 3 number" data-edit-kind="text"></div>
  <div id="team3-name" class="el team-name white" data-edit="Team 3 name" data-edit-kind="text" data-edit-props="teamNameMax,teamNameMin"></div>
  <div id="race-control" class="el white" data-edit="Race control" data-edit-kind="text"></div>
  <div id="pov" class="el" data-edit="POV box" data-edit-kind="box"></div>
  <div id="pov-name" class="el" data-edit="POV name" data-edit-kind="text"></div>
  <div id="clock" class="el white" data-edit="Clock" data-edit-kind="text"></div>

<script>
  const POLL_MS = 2500;
  const TIMER_POLL_MS = 2000, TIMER_TICK_MS = 250;
  let timerState = null, clockOffset = 0;   // serverNow - clientNow at last poll

  function fmtClock(s) {
    s = Math.max(0, Math.ceil(s));
    const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), x = s % 60;
    return `${h}:${String(m).padStart(2, "0")}:${String(x).padStart(2, "0")}`;
  }
  function renderClock() {
    const el = document.getElementById("clock");
    if (!timerState || !timerState.visible) { el.textContent = ""; el.classList.add("empty"); return; }
    let text;
    if (timerState.end === null) {
      const s = (timerState.remaining_s ?? null) !== null ? timerState.remaining_s : timerState.duration_s;
      text = fmtClock(s);
    } else {
      const remaining = timerState.end - (Date.now() / 1000 + clockOffset);
      text = remaining > 0 ? fmtClock(remaining) : "";
    }
    el.textContent = text;
    el.classList.toggle("empty", !text);
  }
  async function pollClock() {
    try {
      const r = await fetch("/timer/data", { cache: "no-store" });
      const d = await r.json();
      if (!d.error) { timerState = d; clockOffset = d.server_now - Date.now() / 1000; }
    } catch (e) { /* keep last good state on transient errors */ }
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    el.textContent = value || "";
    el.classList.toggle("empty", !value);
  }
  function setImg(containerId, key, sub) {
    const el = document.getElementById(containerId);
    const img = el.querySelector("img");
    if (key) { img.src = `/hud/assets/${sub}/${key}`; el.classList.remove("empty"); }
    else { img.removeAttribute("src"); el.classList.add("empty"); }
  }
  function fitName(el) {
    const cs = getComputedStyle(el);
    const max = parseFloat(cs.getPropertyValue("--team-name-max")) || 30;
    const min = parseFloat(cs.getPropertyValue("--team-name-min")) || 16;
    let size = max;
    el.style.fontSize = size + "px";
    while (size > min && el.scrollWidth > el.clientWidth) {
      size -= 1;
      el.style.fontSize = size + "px";
    }
  }
  function setTeam(i, team) {
    const n = i + 1;                 // slot ids are 1-based (team1..team3)
    const name = (team && team.name) || "";
    const number = (team && team.number) || "";
    const numEl = document.getElementById("team" + n + "-num");
    numEl.textContent = number;
    numEl.classList.toggle("empty", !number);
    const nameEl = document.getElementById("team" + n + "-name");
    nameEl.textContent = name;
    nameEl.classList.toggle("empty", !name);
    const logoEl = document.getElementById("team" + n + "-logo");
    const img = logoEl.querySelector("img");
    if (team && team.brandKey) { img.src = `/hud/assets/brands/${team.brandKey}`; logoEl.classList.remove("empty"); }
    else { img.removeAttribute("src"); logoEl.classList.add("empty"); }
    fitName(nameEl);
  }

  async function tick() {
    try {
      const r = await fetch("/hud/data", { cache: "no-store" });
      const d = await r.json();
      setText("stint", d.stint);
      setText("session", d.session);
      setText("streamer", d.streamer);
      setText("round-top", d.round && d.round.top);
      setText("round-country", d.round && d.round.country);
      setImg("round-flag", d.round && d.round.flagKey, "flags");
      (d.teams || []).forEach((t, i) => { if (i < 3) setTeam(i, t); });
      setText("race-control", d.raceControl);
      const povOn = !!d.povActive;
      document.getElementById("pov").classList.toggle("empty", !povOn);
      setText("pov-name", povOn ? (d.povName || "") : "");
    } catch (e) { /* keep last good frame on transient errors */ }
  }
  tick();
  setInterval(tick, POLL_MS);
  pollClock();
  setInterval(pollClock, TIMER_POLL_MS);
  setInterval(renderClock, TIMER_TICK_MS);
</script>
</body>
</html>
