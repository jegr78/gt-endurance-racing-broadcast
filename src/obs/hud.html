<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GT Endurance Racing HUD</title>
<style>
  /* Positions match the old per-cell OBS browser sources 1:1 (align = top-left,
     canvas 1920x1080). The Overlay.png frame stays its own OBS source; this page
     only renders the text/flag/brand that used to be the 13 chroma-keyed sheet
     sources. Tweak coordinates here to fine-tune live. */
  html, body { margin: 0; width: 1920px; height: 1080px;
    background: transparent; overflow: hidden;
    font-family: "Arial Narrow", "Arial", sans-serif; }
  .el { position: absolute; display: flex; align-items: center;
    overflow: hidden; white-space: nowrap; box-sizing: border-box;
    font-weight: 700; line-height: 1; }
  .el.empty { display: none; }
  .white { color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,.55); }
  .black { color: #111111; }

  /* Top red banner */
  #stint { left: 774px; top: 26px; width: 375px; height: 65px;
    justify-content: center; font-size: 40px; letter-spacing: 1px; }

  /* Lower-third left block: session above streamer */
  #session  { left: 733px; top: 921px; width: 265px; height: 40px;
    font-size: 26px; font-style: italic; }
  #streamer { left: 738px; top: 957px; width: 265px; height: 50px;
    font-size: 32px; }

  /* Lower-third round block: title, flag, country */
  #round-top     { left: 1043px; top: 919px; width: 557px; height: 37px;
    font-size: 24px; font-style: italic; }
  #round-flag    { left: 1049px; top: 957px; width: 99px;  height: 40px; }
  #round-flag img { height: 38px; width: auto; max-width: 99px; object-fit: contain;
    box-shadow: 0 1px 3px rgba(0,0,0,.5); }
  #round-country { left: 1144px; top: 958px; width: 548px; height: 39px;
    font-size: 26px; }

  /* Team podium row: each car is THREE independently positionable slots —
     brand logo, number badge, auto-fit name (issue #136). The overlay builder
     can place/restyle each on its own; --team-name-max/min bound the auto-fit. */
  .team-logo { height: 50px; width: 54px; }
  .team-logo img { width: 100%; height: 100%; object-fit: contain; }
  .team-num { height: 56px; background: #c8202a; color: #fff;
    font-size: 20px; padding: 2px 9px; border-radius: 3px; }
  .team-name { height: 56px; --team-name-max: 30px; --team-name-min: 16px;
    overflow: hidden; white-space: nowrap; font-size: var(--team-name-max); }
  /* Defaults reproduce the old single-row look: logo, then badge, then name. */
  #team1-logo { left: 323px; top: 1008px; }
  #team1-num  { left: 387px; top: 1005px; }
  #team1-name { left: 455px; top: 1005px; width: 250px; }
  #team2-logo { left: 766px; top: 1008px; }
  #team2-num  { left: 830px; top: 1005px; }
  #team2-name { left: 898px; top: 1005px; width: 247px; }
  #team3-logo { left: 1210px; top: 1008px; }
  #team3-num  { left: 1274px; top: 1005px; }
  #team3-name { left: 1342px; top: 1005px; width: 248px; }

  /* POV picture-in-picture placeholder (issue #141): a transparent guide box so
     the operator can position/size the POV area on the same canvas. It draws
     nothing on air — the actual POV is an OBS media source positioned in OBS. */
  #pov { left: 40px; top: 560px; width: 480px; height: 270px; }

  /* Race control banner (status line, hidden when empty). Gray band flush
     with the lower-third block of the Overlay.png frame: x 264..1593 and
     #4b565c both measured from the graphic (team name bars). */
  #race-control { left: 264px; top: 864px; width: 1329px; height: 55px;
    font-size: 34px; background: #4b565c; padding-left: 14px; }
</style>
<link rel="stylesheet" href="/hud/override.css">
</head>
<body>
  <!-- data-edit="<label>" marks a slot the Control Center overlay builder can
       position/style; data-edit-props (comma list) limits which property groups
       apply (default = all text props). The markup is the single slot source —
       a new global element becomes editable just by adding these attributes. -->
  <div id="stint" class="el white" data-edit="Stint banner"></div>
  <div id="session" class="el black" data-edit="Session"></div>
  <div id="streamer" class="el black" data-edit="Streamer"></div>
  <div id="round-top" class="el white" data-edit="Round title"></div>
  <div id="round-flag" class="el" data-edit="Round flag" data-edit-props="left,top,width,height"><img alt=""></div>
  <div id="round-country" class="el white" data-edit="Round country"></div>
  <div id="team1-logo" class="el team-logo" data-edit="Team 1 logo" data-edit-props="left,top,width,height"><img alt=""></div>
  <div id="team1-num" class="el team-num white" data-edit="Team 1 number" data-edit-props="left,top,fontSize,fontFamily,color,background"></div>
  <div id="team1-name" class="el team-name white" data-edit="Team 1 name" data-edit-props="left,top,width,height,teamNameMax,teamNameMin,fontFamily,color"></div>
  <div id="team2-logo" class="el team-logo" data-edit="Team 2 logo" data-edit-props="left,top,width,height"><img alt=""></div>
  <div id="team2-num" class="el team-num white" data-edit="Team 2 number" data-edit-props="left,top,fontSize,fontFamily,color,background"></div>
  <div id="team2-name" class="el team-name white" data-edit="Team 2 name" data-edit-props="left,top,width,height,teamNameMax,teamNameMin,fontFamily,color"></div>
  <div id="team3-logo" class="el team-logo" data-edit="Team 3 logo" data-edit-props="left,top,width,height"><img alt=""></div>
  <div id="team3-num" class="el team-num white" data-edit="Team 3 number" data-edit-props="left,top,fontSize,fontFamily,color,background"></div>
  <div id="team3-name" class="el team-name white" data-edit="Team 3 name" data-edit-props="left,top,width,height,teamNameMax,teamNameMin,fontFamily,color"></div>
  <div id="race-control" class="el white" data-edit="Race control"></div>
  <div id="pov" class="el" data-edit="POV box" data-edit-props="left,top,width,height"></div>

<script>
  const POLL_MS = 2500;

  function setText(id, value) {
    const el = document.getElementById(id);
    el.textContent = value || "";
    el.classList.toggle("empty", !value);
  }
  function setImg(containerId, key, sub) {
    const el = document.getElementById(containerId);
    const img = el.querySelector("img");
    if (key) { img.src = `/hud/assets/${sub}/${key}`; el.classList.remove("empty"); }
    else { img.removeAttribute("src"); el.classList.add("empty"); }
  }
  function fitName(el) {
    const cs = getComputedStyle(el);
    const max = parseFloat(cs.getPropertyValue("--team-name-max")) || 30;
    const min = parseFloat(cs.getPropertyValue("--team-name-min")) || 16;
    let size = max;
    el.style.fontSize = size + "px";
    while (size > min && el.scrollWidth > el.clientWidth) {
      size -= 1;
      el.style.fontSize = size + "px";
    }
  }
  function setTeam(i, team) {
    const n = i + 1;                 // slot ids are 1-based (team1..team3)
    const name = (team && team.name) || "";
    const number = (team && team.number) || "";
    const numEl = document.getElementById("team" + n + "-num");
    numEl.textContent = number;
    numEl.classList.toggle("empty", !number);
    const nameEl = document.getElementById("team" + n + "-name");
    nameEl.textContent = name;
    nameEl.classList.toggle("empty", !name);
    const logoEl = document.getElementById("team" + n + "-logo");
    const img = logoEl.querySelector("img");
    if (team && team.brandKey) { img.src = `/hud/assets/brands/${team.brandKey}`; logoEl.classList.remove("empty"); }
    else { img.removeAttribute("src"); logoEl.classList.add("empty"); }
    fitName(nameEl);
  }

  async function tick() {
    try {
      const r = await fetch("/hud/data", { cache: "no-store" });
      const d = await r.json();
      setText("stint", d.stint);
      setText("session", d.session);
      setText("streamer", d.streamer);
      setText("round-top", d.round && d.round.top);
      setText("round-country", d.round && d.round.country);
      setImg("round-flag", d.round && d.round.flagKey, "flags");
      (d.teams || []).forEach((t, i) => { if (i < 3) setTeam(i, t); });
      setText("race-control", d.raceControl);
    } catch (e) { /* keep last good frame on transient errors */ }
  }
  tick();
  setInterval(tick, POLL_MS);
</script>
</body>
</html>
