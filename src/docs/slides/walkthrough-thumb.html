<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- YouTube thumbnail template (1280x720) for the narrated walkthrough videos
     (tools/build-walkthrough-videos.py). Plain HTML still, NOT a Reveal deck (it
     has no reveal root marker), so it is excluded from the deck list and the
     overflow guard. The builder sets body[data-role] (drives the accent colour
     via deck.css) plus #title / #sub text per video. Reuses the deck fonts. -->
<link rel="stylesheet" href="assets/deck.css">
<style>
  html,body{margin:0;width:1280px;height:720px;background:#fff;overflow:hidden}
  body{display:flex;flex-direction:column}
  .content{flex:1;min-height:0;display:flex;flex-direction:column;
    justify-content:center;box-sizing:border-box;padding:40px 88px;
    font-family:var(--mono);color:var(--ink)}
  .bar{width:230px;height:20px;border-radius:5px;background:var(--accent)}
  .tag{font-family:var(--head);letter-spacing:.28em;text-transform:uppercase;
    font-size:30px;color:var(--soft);margin:26px 0 0}
  #title{font-family:var(--head);font-weight:700;text-transform:uppercase;
    letter-spacing:.02em;line-height:.94;font-size:150px;color:var(--accent);
    margin:14px 0 0;max-width:1080px}
  #sub{font-size:52px;color:var(--ink);margin-top:28px;max-width:1040px}
  .band{flex:none;height:104px;background:var(--accent);display:flex;
    align-items:center;justify-content:space-between;padding:0 88px;
    box-sizing:border-box}
  .band .l{font-family:var(--head);letter-spacing:.3em;text-transform:uppercase;
    font-size:38px;color:#fff}
  .band .r{font-family:var(--head);letter-spacing:.18em;text-transform:uppercase;
    font-size:28px;color:rgba(255,255,255,.85)}
</style>
</head>
<body data-role="producer">
  <div class="content">
    <div class="bar"></div>
    <div class="tag">GT Endurance Racing Broadcast</div>
    <div id="title">Producer</div>
    <div id="sub">Event-day playbook</div>
  </div>
  <div class="band">
    <span class="l">Onboarding</span>
    <span class="r">Walkthrough</span>
  </div>
</body>
</html>
