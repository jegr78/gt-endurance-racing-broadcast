<span class="role-tag">Director · Onboarding</span>
# Director
You drive the show from a browser — scenes, feeds, graphics and the interview cut.
No machine access needed.

Note: Welcome to the director onboarding. As director, you drive the entire show from a browser — the scenes, the feeds, the graphics, and the interview cut at the end. You do not need any access to the machine itself.
</script></section>

<section data-markdown><script type="text/template">
## Your job in one sentence
Choose what viewers see, and press **Feeds Next** at every driver change.
The producer only starts and stops; everything in between is yours.

Note: Here is your job in one sentence. You choose what the viewers see, and you press Feeds Next at every driver change. The producer only starts and stops the show; everything in between is yours.
</script></section>

<section data-markdown><script type="text/template">
## Before the event
- Open the **Console** link the producer sends you — it works over the internet, with
  **no Tailscale account, IP or password** needed. Sign in with **Discord** (or a personal
  sign-in link if your league has no Discord login). It opens the Console launcher — tap
  the **Director Panel** card.
- Use a desktop browser; have Discord ready for the interview segment.
- First time? Walk through [Director setup](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Director-Setup).

Note: Before the event, open the Console link the producer sends you. It works over the internet, with no Tailscale account, I P or password needed. Sign in with Discord, or with a personal sign-in link if your league has no Discord login. That opens the Console launcher — just tap the Director Panel card. Use a desktop browser, and have Discord ready for the interview segment. If it is your first time, walk through the Director setup guide.
</script></section>

<section data-markdown><script type="text/template">
## The event flow
The show is a loop: go live, then at each driver change advance the feeds and
re-dress the scene. The steps follow →

![Event flow](assets/img/diagrams/director-event-flow.svg)

Note: The show is a loop. You go live, and then at each driver change you advance the feeds and re-dress the scene. The individual steps follow on the next slides.
</script></section>

<section data-markdown><script type="text/template">
### 1 · Standby → Go live
Start on the **Standby** cover. When the producer confirms the relay is up,
press **INTRO** to roll the opening clip, then cut into the live program.

Note: Step one is Standby to go live. Start on the Standby cover. When the producer confirms the relay is up, press Intro to roll the opening clip, then cut into the live program.
</script></section>

<section data-markdown><script type="text/template">
### 2 · Each driver change
1. Cut to **Splitscreen** first (both commentators on screen for the swap).
2. Then press **Feeds Next** to complete the handover — the off-air feed has
   already pre-rolled the next commentator, so the relay cuts cleanly back to
   Stint on the incoming feed.
3. Dress the scene + graphics. *Which graphic when (formation lap, final lap, red
   flag…) → the full sequence is in the [Director guide](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Director).*

Note: Step two happens at each driver change. First, cut to Splitscreen, so both commentators are on screen for the swap. Then press Feeds Next to complete the handover — the off-air feed has already pre-rolled the next commentator, so the relay cuts cleanly back to the stint on the incoming feed. Finally, dress the scene and graphics. For which graphic to show when — the formation lap, the final lap, a red flag and so on — the full sequence is in the Director guide.
</script></section>

<section data-markdown><script type="text/template">
### 3 · Talk to commentators
Send **cues** from the panel — info toasts or sticky critical banners the
commentator must acknowledge.

Note: Step three is talking to your commentators. Send cues from the panel — these can be info toasts, or sticky critical banners that the commentator must acknowledge.
</script></section>

<section data-markdown><script type="text/template">
### 4 · Interview + end
On the final stint, cut to the **Interview** scene and unmute Discord on the **AUDIO**
bus (the producer must be joined to the Discord "Interviews" voice channel), then roll
the **Outro**.

Note: Step four is the interview and the end. On the final stint, cut to the Interview scene and unmute Discord on the Audio bus — the producer must be joined to the Discord Interviews voice channel. Then roll the Outro.
</script></section>

<section data-markdown><script type="text/template">
## When things go wrong
Feed black? Panel unresponsive? Work the checklist in
[If something goes wrong](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/If-something-goes-wrong).
Keep calm — the producer can restart the relay without losing your scene.

Note: When things go wrong — a black feed, or an unresponsive panel — work the checklist on the If something goes wrong page. Keep calm: the producer can restart the relay without losing your scene.
</script></section>

<section data-markdown><script type="text/template">
## Recap
- Press **Feeds Next** at every driver change.
- Dress the scene: graphics, standings, weather.
- Cue commentators; cut to the interview at the end.
Go deeper: [Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what) ·
[Director guide](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Director)

Note: To recap: press Feeds Next at every driver change. Dress the scene with graphics, standings and weather. Cue your commentators, and cut to the interview at the end. To go deeper, see the Who does what page and the Director guide.
</script></section>
