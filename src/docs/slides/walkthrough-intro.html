<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Title card for the narrated walkthrough videos (tools/build-walkthrough-videos.py).
     This is a plain HTML still, NOT a Reveal deck (it has no reveal root marker),
     so it is excluded from the deck list and the overflow guard. Reuses the deck
     design system (fonts + colour vars). -->
<link rel="stylesheet" href="assets/deck.css">
<style>
  html,body{margin:0;height:100%;background:#fff}
  .card{height:100vh;display:flex;flex-direction:column;justify-content:center;
    align-items:center;text-align:center;font-family:var(--mono);color:var(--ink);
    padding:0 8%;box-sizing:border-box}
  .bar{display:flex;gap:8px;margin-bottom:44px}
  .bar span{width:38px;height:12px;border-radius:4px}
  .tag{font-family:var(--head);letter-spacing:.32em;text-transform:uppercase;
    font-size:22px;color:var(--soft);margin-bottom:20px}
  h1{font-family:var(--head);font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;font-size:76px;line-height:1.04;margin:0;color:var(--ink)}
</style>
</head>
<body>
  <div class="card">
    <div class="bar">
      <span style="background:var(--producer)"></span>
      <span style="background:var(--director)"></span>
      <span style="background:var(--commentator)"></span>
      <span style="background:var(--race-control)"></span>
      <span style="background:var(--league-admin)"></span>
      <span style="background:var(--overlay-designer)"></span>
    </div>
    <div class="tag">Onboarding</div>
    <h1>GT Endurance Racing<br>Broadcast</h1>
  </div>
</body>
</html>
