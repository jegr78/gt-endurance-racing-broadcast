# Producer setup (once per machine)
~30 minutes, then you're ready to run events.
</script></section>

<section data-markdown><script type="text/template">
## What you need
- A modern PC — **macOS, Windows, or Linux**. 16 GB RAM is tight (reboot before events); 32 GB is comfortable.
- A **wired** internet connection — at least **25 Mbps down / 10 Mbps up** (50 / 20 recommended).
- A **YouTube login** (always required for cookies), plus the **shared Google Sheet** link from the team.

Details: [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC)
</script></section>

<section data-markdown><script type="text/template">
## Why download matters too
This station **pulls in** as much as it **pushes out** — on the same line, at the same time.

- **Feed A** (on-air pull): ~5–6 Mbps
- **Feed B** (pre-rolling during a handover): ~5–6 Mbps
- **POV** (optional driver picture-in-picture): ~3–6 Mbps
- **Program out** to the league channel: ~6–9 Mbps

The handover worst case is Feed A + B + POV **down** and program **up** at once. **Wired only** — a Wi-Fi jitter spike at a driver change is the classic failure.

Details: [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC)
</script></section>

<section data-markdown><script type="text/template">
## The easy way — the Setup wizard
Double-click **`racecast-ui`** — it opens in your browser and walks every step with a progress checklist. `racecast init` is the CLI equivalent.

![Setup wizard](assets/img/cc-setup.png)

Details: [Control Center](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Control-Center) · [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC)
</script></section>

<section data-markdown><script type="text/template">
## The steps
1. **Get the tool** — download the archive for your OS from the latest release; extract it into its own folder.
2. **`racecast install-tools`** — installs `yt-dlp`, `streamlink`, `ffmpeg`, and **`deno`** (deno is required to pass YouTube's bot check).
3. **`racecast install-apps`** — installs OBS Studio, Bitfocus Companion, Tailscale, and Discord.
4. **Create a league profile** — `racecast profile new myleague --from example`, then fill in `SHEET_ID`.
5. **Import OBS scenes** — `racecast setup`, then import the generated collection in OBS.
6. **Import Companion buttons** — `racecast export companion`, then import in Companion's admin.

Details: [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC)
</script></section>

<section data-markdown><script type="text/template">
## Let Companion control OBS
In OBS: **Tools → WebSocket Server Settings**

- Enable the server (port `4455`)
- Turn on authentication
- Set a password

In Companion: open **Connections** and enter the **same** password for the OBS connection.

**You should see:** the OBS connection **green** under Companion → Connections.

Details: [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC)
</script></section>

<section data-markdown><script type="text/template">
## Connect remote directors (Tailscale)
**macOS / Windows:** open the Tailscale app and sign in (free account).

**Linux — two one-time commands:**
```bash
sudo tailscale up          # prints a login URL — open it and approve
sudo tailscale set --operator=$USER   # allows connect/disconnect without sudo
```

Then invite each director (free, up to 6) at [login.tailscale.com](https://login.tailscale.com/admin/users) — they install Tailscale and sign in too.

Details: [Set up the broadcast PC](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Set-up-the-broadcast-PC) · [Director Setup](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Director-Setup)
</script></section>

<section data-markdown><script type="text/template">
## Preflight + recap
Run the hardware and tool check before your first event:

```bash
racecast preflight
```

Or in the Control Center: **Preflight → Run**.

Fix anything flagged. Once everything is green, you're ready.
