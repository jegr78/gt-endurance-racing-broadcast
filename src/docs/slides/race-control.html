# Race Control
A **read-only** monitoring desk — watch the race without touching the broadcast.

Note: Welcome to the Race Control onboarding. Race Control is a read-only monitoring desk. You watch the race closely, but you never touch the broadcast itself.
</script></section>

<section data-markdown><script type="text/template">
## Read-only on the broadcast
- You trigger **no scenes, graphics or feeds** — the **director keeps full control**.
- But the **crew chat is two-way** — it's your working channel (next →).

[Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: You are read-only on the broadcast itself — you trigger no scenes, graphics or feeds, and the director keeps full control of what goes on air. But the crew chat is two-way, and that is your working channel, which we will look at next.
</script></section>

<section data-markdown><script type="text/template">
## What you see

![Race Control desk](assets/img/console-race-control.png)

Live **program preview** · **redacted** streamer/stint schedule (URLs stay on the tailnet) · **race timer** · **crew chat** (under your own name).

[Console](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Console)

Note: Here is what you see at the desk. There is a live program preview, the redacted streamer and stint schedule with the stream URLs kept on the tailnet, the race timer, and the crew chat, which posts under your own name.
</script></section>

<section data-markdown><script type="text/template">
## Your channel: the crew chat
Post the race-control facts as they happen, and steer the commentators:

- **DSQ / drive-through**, a car's **rejoin time**, a team that **can't field a driver**, a team **retiring**.
- **Direct the commentators** — e.g. *"cut to car #7, P3"*.

Messages post under your own name.

Note: The crew chat is your channel. Post the race-control facts as they happen — a disqualification or drive-through, a car's rejoin time, a team that can't field a driver, or a team retiring. You also direct the commentators here, for example by asking them to cut to car number seven in third place. Everything you post appears under your own name.
</script></section>

<section data-markdown><script type="text/template">
## How the crew fits together

![Who does what](assets/img/diagrams/who-does-what.svg)

The role is **additive** — the same person can direct the show **and** run Race Control.

[Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: This is how the crew fits together. The Race Control role is additive, which means the same person can direct the show and run Race Control at the same time.
</script></section>

<section data-markdown><script type="text/template">
## Getting in
1. Open the **Console** link the producer sends you and **sign in with Discord**
   (or a personal sign-in link if your league has no Discord login).
2. On the launcher, **tap the Race Control card** — it appears if you are flagged for it
   (the producer/admin sets this in the Sheet's Crew tab **Race Control** column).
3. Over the public Funnel you need **no Tailscale account**; if the producer only runs
   the tailnet, you'll need the Tailscale app.

[Console](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Console) ·
[Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: To get in, open the Console link the producer sends you and sign in with Discord, or use a personal sign-in link if your league has no Discord login. On the launcher, tap the Race Control card — it appears if you are flagged for the role, which the producer or admin sets in the Sheet's Crew tab, in the Race Control column. Over the public Funnel you need no Tailscale account; if the producer only runs the tailnet, you'll need the Tailscale app.
</script></section>

<section data-markdown><script type="text/template">
## Recap
- Read-only on the broadcast — no scenes, graphics or feeds.
- **Post race-control info + direct commentators in the crew chat.**
- Schedule is redacted; stream URLs stay on the tailnet.
- Role is additive; one person can hold multiple roles.

Go deeper:
[Console](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Console) ·
[Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: To recap: you are read-only on the broadcast, with no scenes, graphics or feeds. Your job is to post race-control information and direct the commentators in the crew chat. The schedule you see is redacted, so stream URLs stay on the tailnet. And the role is additive, so one person can hold several roles at once.
</script></section>
