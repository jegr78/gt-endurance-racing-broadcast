# Commentator
You stream your stint on your own channel; the producer's relay pulls it in.

Note: Welcome to the commentator onboarding. Your role is simple: you stream your stint on your own channel, and the producer's relay pulls it into the broadcast. Let's walk through how to set up your stream and use your console.
</script></section>

<section data-markdown><script type="text/template">
## What the producer needs from you
Before race day, give your league/producer:

- Your **Discord handle** — used to match your Console login (without it, Discord
  sign-in won't recognise you).
- Your **channel name** (the same YouTube/Twitch channel every event).

These go into the league's Crew tab so your login and your stints map to you.

Note: Before race day, give your league or producer two things. First, your Discord handle, which is used to match your Console login — without it, Discord sign-in won't recognise you. Second, your channel name, the same YouTube or Twitch channel you use every event. These go into the league's Crew tab so your login and your stints map to you.
</script></section>

<section data-markdown><script type="text/template">
## Stream settings
- Platform: your own **YouTube** or **Twitch**, set to **Unlisted**, the **same channel** every event.
- Latency: **Low** (not Ultra-low) — buffering protection lives on the producer side.
- Resolution: **1080p** target; if upload can't hold it, drop to **720p — never below**.
- **CBR**, 2 s keyframes; use a **hardware encoder** (NVENC / QuickSync / AMF).
- **No personal overlays** — graphics are added centrally.

More: [Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: Here are your stream settings. Use your own YouTube or Twitch, set to Unlisted, on the same channel every event. Set latency to Low, not Ultra-low — buffering protection lives on the producer side. Aim for ten eighty p; if your upload can't hold it, drop to seven twenty p, but never below. Use constant bitrate with two second keyframes, and a hardware encoder such as NVENC, QuickSync or AMF. And add no personal overlays — graphics are added centrally.
</script></section>

<section data-markdown><script type="text/template">
## Streaming from a PlayStation (no PC)
- **PS5:** 1080p60 to YouTube or Twitch; pick **Unlisted** right on the console.
- **PS4 Pro:** 1080p. **Base PS4:** 720p — still fine (never below 720p).
- **Latency — set once, beforehand** on the channel (the console has no latency knob):
  - YouTube Studio → Settings → stream latency → **Low**.
  - Twitch Creator Dashboard → Stream → **Low Latency** on (default).
- No CBR / keyframe / encoder knobs on the console — just set resolution and privacy.

More: [Who does what](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Who-does-what)

Note: You can also stream straight from a PlayStation with no PC. On a PS5, stream ten eighty p sixty to YouTube or Twitch, and pick Unlisted right on the console. A PS4 Pro does ten eighty p, and a base PS4 does seven twenty p, which is still fine — just never below seven twenty p. The console has no latency knob, so set it once beforehand on the channel: in YouTube Studio, under Settings, stream latency, choose Low; in the Twitch Creator Dashboard, under Stream, turn Low Latency on, which is the default. There are no bitrate, keyframe or encoder knobs on the console — just set resolution and privacy.
</script></section>

<section data-markdown><script type="text/template">
## Open your Console
Sign in at the Console link your producer shares — with Discord, or a personal sign-in link.
Your cockpit appears as one of the role-gated cards.

![The Console launcher](assets/img/console-landing.png)

More: [Console](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Console) · [Commentator Cockpit](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Commentator-Cockpit)

Note: To open your console, sign in at the Console link your producer shares — either with Discord, or with a personal sign-in link. Once you're in, your cockpit appears as one of the role-gated cards on the launcher.
</script></section>

<section data-markdown><script type="text/template">
## Send your watch link
- **Preferred:** submit it from your **cockpit** — pick your stint, paste the URL, and submit.
- It lands as a **pending request** the director approves before it can go on air.
- You can only ever touch your **own** stints, never anyone else's.
- **Alternative:** post your `youtube.com/watch?v=…` / `twitch.tv/<you>` link in the crew **Discord** before your stint.

Note: Now send your watch link. The preferred way is to submit it from your cockpit — pick your stint, paste the URL, and submit. It lands as a pending request that the director approves before it can go on air, and you can only ever touch your own stints, never anyone else's. As an alternative, post your YouTube or Twitch link in the crew Discord before your stint.
</script></section>

<section data-markdown><script type="text/template">
## Your cockpit
- **Live program monitor** — low-bandwidth JPEG stills of the actual broadcast output.
- **Tally** — large **YOU ARE ON AIR** indicator, or **UP NEXT · stint N · in X handovers**.
- **Crew chat** — the same chat as the Director Panel, attributed to you.
- **Race timer** — the live remaining-time clock.
- **Submit a stream link** — propose your URL for one of your own stints.
- **Graphics** — browse the broadcast graphics and open any in a new tab.

More: [Commentator Cockpit](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Commentator-Cockpit)

Note: Your cockpit gives you everything in one place. There's a live program monitor showing low-bandwidth stills of the actual broadcast output, and a tally with a large "you are on air" indicator, or "up next" with your stint number and how many handovers away you are. You also get the crew chat, the same one as the Director Panel and attributed to you, the live race timer, the stream-link submission form for your own stints, and a graphics browser to open any broadcast graphic in a new tab.
</script></section>

<section data-markdown><script type="text/template">
## Director cues
Directors send short text cues to your cockpit — a text-only stand-in for an earpiece.

- **Info** — brief auto-fading toast at the top; disappears after **30 seconds** on its own.
- **Critical** — sticky banner that stays on screen until you click **Acknowledge**; the director then sees a **✓ seen** stamp.
- Cues are **visual only — there is no sound**. Keep the cockpit open on a visible
  screen so you notice a critical banner.

You only receive cues addressed to you by name or to **All commentators**.

More: [Commentator Cockpit](https://github.com/jegr78/gt-endurance-racing-broadcast/wiki/Commentator-Cockpit)

Note: Directors send short text cues to your cockpit — a text-only stand-in for an earpiece. An Info cue is a brief toast at the top that fades away on its own after thirty seconds. A Critical cue is a sticky banner that stays on screen until you click Acknowledge, after which the director sees a "seen" stamp. Cues are visual only — there is no sound — so keep the cockpit open on a visible screen to notice a critical banner. You only receive cues addressed to you by name, or to All commentators.
</script></section>

- Acknowledge any **Critical** cues promptly.
