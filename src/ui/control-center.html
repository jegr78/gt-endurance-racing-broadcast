<!DOCTYPE html>
<!-- IRO Control Center — producer web UI served by `iro ui` (ui_server.py).
     Single static file, inline CSS/JS, no framework, no build step (same
     model as director-panel.html). All state lives server-side; this page
     only polls /api/status and renders SSE streams.
     Design: "Ops Console" — slate dark + status colors, sans for labels,
     monospace for data. Offline-safe: system fonts only, inline SVG icons. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRO Control Center</title>
<link rel="icon" href="data:,"><!-- no favicon — silence the 404 console noise -->
<style>
  :root {
    --bg:#0F172A; --card:#1B2336; --card2:#151C2E; --line:#273349;
    --txt:#F8FAFC; --dim:#94A3B8; --faint:#64748B;
    --ok:#22C55E; --warn:#F59E0B; --bad:#EF4444; --off:#475569;
    --accent:#3B82F6;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas,
            "Liberation Mono", monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
         background:var(--bg); color:var(--txt);
         background-image:radial-gradient(1200px 400px at 50% -200px,
                          #1E293B 0%, var(--bg) 70%); }
  header { display:flex; align-items:center; gap:14px; padding:14px 24px;
           border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:baseline; gap:8px; }
  .brand .mark { font:700 15px/1 var(--mono); letter-spacing:.06em;
                 color:#0F172A; background:var(--accent); border-radius:6px;
                 padding:5px 7px; }
  .brand h1 { font-size:16px; font-weight:600; letter-spacing:.01em; margin:0; }
  .ver { color:var(--faint); font:12px var(--mono); }
  .spacer { flex:1; }
  header a { color:var(--accent); font-size:13px; text-decoration:none;
             border:1px solid var(--line); border-radius:8px; padding:7px 12px;
             transition:border-color .2s, background .2s; }
  header a:hover { border-color:var(--accent); background:#1E293B; }
  main { max-width:1100px; margin:0 auto; padding:24px; display:grid; gap:18px; }
  section { background:var(--card); border:1px solid var(--line);
            border-radius:12px; padding:18px 20px;
            box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(2,6,23,.35); }
  h2 { display:flex; align-items:center; gap:8px; font-size:12px;
       text-transform:uppercase; letter-spacing:.1em; color:var(--dim);
       margin:0 0 10px; font-weight:600; }
  .row { display:flex; align-items:center; gap:12px; padding:10px 8px;
         border-top:1px solid var(--line); flex-wrap:wrap; border-radius:8px;
         transition:background .15s; }
  .row:hover { background:rgba(148,163,184,.05); }
  .row:first-of-type { border-top:0; }
  .name { width:110px; font-weight:600; font-size:14px; }
  .badge { display:inline-flex; align-items:center; gap:7px; padding:3px 11px;
           border-radius:99px; font:600 11px/1.6 var(--mono); letter-spacing:.04em;
           background:rgba(71,85,105,.25); color:var(--dim);
           border:1px solid rgba(148,163,184,.18); }
  .badge .dot { width:7px; height:7px; border-radius:50%; background:var(--off); }
  .badge.on { background:rgba(34,197,94,.12); color:#4ADE80;
              border-color:rgba(34,197,94,.35); }
  .badge.on .dot { background:var(--ok); animation:pulse 2s ease-out infinite; }
  @keyframes pulse {
    0%   { box-shadow:0 0 0 0 rgba(34,197,94,.45); }
    70%  { box-shadow:0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .badge.on .dot { animation:none; }
    .spin { animation:none !important; }
  }
  .dim { color:var(--dim); font:12px var(--mono); font-variant-numeric:tabular-nums; }
  .grow { flex:1; min-width:140px; }
  button { display:inline-flex; align-items:center; gap:6px; min-height:34px;
           background:#232C42; color:var(--txt); border:1px solid var(--line);
           border-radius:8px; padding:6px 13px; cursor:pointer; font-size:13px;
           font-weight:500; transition:border-color .2s, background .2s,
           transform .1s; }
  button svg { width:13px; height:13px; stroke:currentColor; fill:none;
               stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round;
               opacity:.85; }
  button:hover { border-color:var(--accent); background:#283352; }
  button:active { transform:scale(.97); }
  button:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  button.danger { color:#FCA5A5; }
  button.danger svg { stroke:#F87171; }
  button.danger:hover { border-color:var(--bad); background:rgba(239,68,68,.12); }
  .chip { font:600 11px var(--mono); border-radius:6px; padding:3px 9px; }
  .chip.ok { color:#4ADE80; background:rgba(34,197,94,.12);
             border:1px solid rgba(34,197,94,.35); }
  .chip.fail { color:#FCA5A5; background:rgba(239,68,68,.12);
               border:1px solid rgba(239,68,68,.35); }
  .spin { width:13px; height:13px; border:2px solid var(--line);
          border-top-color:var(--warn); border-radius:50%;
          animation:rot .8s linear infinite; }
  @keyframes rot { to { transform:rotate(360deg); } }
  pre { background:#0B1120; border:1px solid var(--line); border-radius:10px;
        padding:12px 14px; height:280px; overflow:auto; white-space:pre-wrap;
        margin:10px 0 0; font:12px/1.55 var(--mono); color:#CBD5E1; }
  select { background:#232C42; color:var(--txt); border:1px solid var(--line);
           border-radius:8px; padding:7px 10px; font-size:13px; min-height:34px;
           cursor:pointer; }
  select:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="mark">IRO</span><h1>Control Center</h1></div>
  <span class="ver" id="ver"></span>
  <span class="spacer"></span>
  <a id="panel-link" href="#" target="_blank" hidden>Director panel ↗</a>
  <button class="danger" onclick="quitUi()">
    <svg viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
    Quit</button>
</header>
<main>
  <section>
    <h2>Dashboard</h2>
    <div class="row"><span class="name">Relay</span>
      <span class="badge" id="b-relay"><span class="dot"></span><span>…</span></span>
      <span class="dim grow" id="d-relay"></span>
      <button onclick="op('relay-start')">
        <svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg>Start</button>
      <button class="danger" onclick="op('relay-stop', true)">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>Stop</button>
      <button onclick="op('relay-restart', true)">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Restart</button></div>
    <div class="row"><span class="name">Companion</span>
      <span class="badge" id="b-companion"><span class="dot"></span><span>…</span></span>
      <span class="dim grow" id="d-companion"></span>
      <button onclick="op('companion-start')">
        <svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg>Start</button>
      <button class="danger" onclick="op('companion-stop', true)">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>Stop</button>
      <button onclick="op('companion-restart', true)">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Restart</button></div>
    <div class="row"><span class="name">Streams</span>
      <span class="badge" id="b-streams"><span class="dot"></span><span>…</span></span>
      <span class="dim grow" id="d-streams"></span>
      <button onclick="op('streams-start')">
        <svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg>Start</button>
      <button class="danger" onclick="op('streams-stop', true)">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>Stop</button></div>
    <div class="row"><span class="name">Tailscale</span>
      <span class="badge" id="b-ts"><span class="dot"></span><span>…</span></span>
      <span class="dim grow" id="d-ts"></span>
      <button onclick="op('tailscale-up')">
        <svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>Up</button>
      <button class="danger" onclick="op('tailscale-down', true)">
        <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>Down</button></div>
    <div class="row"><span class="name">OBS pages</span>
      <span class="dim grow">Reload the relay-served HUD/timer browser sources</span>
      <button onclick="op('obs-refresh')">
        <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh</button></div>
  </section>
  <section id="job" hidden>
    <h2>Job: <span id="jobtitle" style="color:var(--txt)"></span>
        <span class="spin" id="jobspin"></span>
        <span id="jobchip" hidden></span></h2>
    <pre id="joblog"></pre>
  </section>
  <section>
    <h2>Service logs</h2>
    <select id="logsel" onchange="watchLog(this.value)">
      <option value="">— select a log —</option>
      <option value="relay">relay</option>
      <option value="companion">companion</option>
      <option value="streams">streams</option>
    </select>
    <pre id="svclog"></pre>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
let jobES = null, logES = null;

function setBadge(key, on, onText, offText, detail) {
  const b = $('b-' + key);
  b.lastElementChild.textContent = on ? onText : offText;
  b.classList.toggle('on', on);
  $('d-' + key).textContent = detail || '';
}

async function refresh() {
  let s;
  try {
    s = await (await fetch('/api/status', {cache: 'no-store'})).json();
  } catch (e) { return; }            // server gone (quit) — keep the last state
  if (!s.ok) return;                 // status provider error — keep the last state
  $('ver').textContent = s.version;
  const relayUp = s.relay.alive;
  setBadge('relay', relayUp, 'RUNNING', 'stopped',
    relayUp ? (s.relay.http_ok ? 'control OK on port ' + s.relay.port
                               : 'port ' + s.relay.port + ' not responding') : '');
  $('panel-link').hidden = !(relayUp && s.relay.http_ok);
  $('panel-link').href = 'http://127.0.0.1:' + s.relay.port + '/panel';
  setBadge('companion', s.companion.running, 'RUNNING', 'stopped',
           s.companion.url || s.companion.why);
  const up = s.streams.filter(f => f.alive).length;
  setBadge('streams', up > 0, 'RUNNING', 'stopped',
           s.streams.length ? up + '/' + s.streams.length + ' feeds up'
                            : 'no feeds started');
  setBadge('ts', !!s.tailscale_ip, 'CONNECTED', 'down',
           s.tailscale_ip || 'not connected');
}

async function op(name, confirmFirst) {
  if (confirmFirst && !confirm('Run ' + name + '?')) return;
  let r;
  try {
    r = await (await fetch('/api/op/' + name, {method: 'POST'})).json();
  } catch (e) { alert('Control Center not reachable.'); return; }
  if (!r.ok) { alert(r.error); return; }
  watchJob(name, r.job_id);
}

function watchJob(name, id) {
  if (jobES) jobES.close();
  $('job').hidden = false;
  $('jobtitle').textContent = name;
  $('jobspin').hidden = false;
  $('jobchip').hidden = true;
  $('joblog').textContent = '';
  jobES = new EventSource('/api/jobs/' + id + '/stream');
  jobES.onmessage = e => {
    $('joblog').textContent += e.data + '\n';
    $('joblog').scrollTop = 1e9;
  };
  jobES.addEventListener('done', e => {
    const ok = e.data === '0';
    $('jobspin').hidden = true;
    const chip = $('jobchip');
    chip.hidden = false;
    chip.className = 'chip ' + (ok ? 'ok' : 'fail');
    chip.textContent = ok ? 'done' : 'failed (exit ' + e.data + ')';
    jobES.close();
    refresh();
  });
}

function watchLog(name) {
  if (logES) { logES.close(); logES = null; }
  $('svclog').textContent = '';
  if (!name) return;
  logES = new EventSource('/api/logs/' + name + '/stream');
  logES.onmessage = e => {
    $('svclog').textContent += e.data + '\n';
    $('svclog').scrollTop = 1e9;
  };
}

async function quitUi() {
  if (!confirm('Quit the Control Center? Relay/Companion/streams keep running.')) return;
  try { await fetch('/api/quit', {method: 'POST'}); } catch (e) {}
  document.body.innerHTML =
    '<p style="padding:30px;font:14px system-ui;color:#F8FAFC">Control Center stopped — you can close this tab.</p>';
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
