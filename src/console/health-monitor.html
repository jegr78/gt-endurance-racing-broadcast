<!doctype html>
<html lang="en">
<head>
<script>
  // /console base-path shim (#216). The server replaces __RC_API_BASE__ with the
  // active mount ("/console" behind Funnel, "" at the tailnet/loopback root).
  // Patches fetch and exposes RC_API() so same-origin API calls resolve under the
  // mount; a no-op when the base is empty.
  window.RC_API_BASE = "__RC_API_BASE__";
  window.RC_OAUTH = "__RC_OAUTH__" === "1";
  window.RC_API = function (p) {
    var b = window.RC_API_BASE || "";
    if (!b || typeof p !== "string" || p.charAt(0) !== "/") return p;
    if (p.indexOf(b + "/") === 0 || p === b) return p;   // already prefixed
    return b + p;
  };
  (function () {
    var _f = window.fetch;
    window.fetch = function (u, o) { return _f(window.RC_API(u), o); };
  })();
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  :root {
    color-scheme: dark;
    --green: #2ECC71;
    --yellow: #F1C40F;
    --red: #E74C3C;
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1b1f25;
    --line: #232830;
    --line-2: #1c2027;
    --txt: #e8eaed;
    --muted: #8b97a6;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--txt); }
  a { color: var(--txt); }

  header { display: flex; align-items: center; gap: 12px; padding: 10px 14px;
           background: var(--panel); border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  a.back { display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
           color: var(--txt); background: var(--panel-2); border: 1px solid var(--line);
           border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; }
  a.back:hover { border-color: var(--accent); }
  #hm-title { font-size: 13px; font-weight: 600; color: #ffb454; }
  #hm-title:not(:empty)::before { content: "· "; opacity: .5; font-weight: 400; }

  main { padding: 12px; display: flex; flex-direction: column; gap: 12px; max-width: 1180px; margin: 0 auto; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted);
       margin: 0; padding: 10px 12px; border-bottom: 1px solid var(--line); font-weight: 700; }
  .body { padding: 12px; }

  /* --- Status header --- */
  .status { display: flex; align-items: center; gap: 16px; padding: 14px; flex-wrap: wrap; }
  #hm-badge { font-size: 22px; font-weight: 800; letter-spacing: .04em; padding: 10px 18px;
              border-radius: 10px; color: #0a0c0f; text-transform: uppercase; min-width: 110px;
              text-align: center; background: #333; }
  #hm-badge.green { background: var(--green); }
  #hm-badge.yellow { background: var(--yellow); }
  #hm-badge.red { background: var(--red); color: #fff; }
  .status-meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
  .status-meta .row1 { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .status-meta .since { font-size: 13px; color: var(--muted); }
  .pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px;
          border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line);
          letter-spacing: .04em; }
  .pill.live { background: #1f3a2a; border-color: #2ECC71; color: var(--green); }
  #hm-reasons { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 3px; }
  #hm-reasons li { font-size: 13px; color: var(--txt); }
  #hm-reasons li::before { content: "▸ "; color: var(--muted); }
  #hm-reasons:empty::after { content: "All systems nominal."; color: var(--green); font-size: 13px; }

  /* --- Time range bar --- */
  .rangebar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 12px; }
  .rangebar .btn { padding: 6px 12px; background: var(--panel-2); color: var(--txt);
                   border: 1px solid var(--line); border-radius: 8px; cursor: pointer;
                   font-size: 13px; font-weight: 600; }
  .rangebar .btn:hover { border-color: var(--accent); }
  .rangebar .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .rangebar .sep { width: 1px; align-self: stretch; background: var(--line); margin: 0 4px; }
  .rangebar label { font-size: 12px; color: var(--muted); }
  .rangebar input[type=datetime-local] { background: var(--bg); color: var(--txt);
                   border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px; font-size: 13px; }
  .rangebar .apply { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }

  /* --- Status bands --- */
  .bands { display: flex; flex-direction: column; gap: 8px; padding: 12px; }
  .bandrow { display: grid; grid-template-columns: 140px 1fr; align-items: center; gap: 10px; }
  .bandlabel { font-size: 12px; color: var(--muted); font-weight: 600; text-align: right; }
  .bandtrack { position: relative; height: 22px; background: #0a0c0f; border: 1px solid var(--line-2);
               border-radius: 5px; overflow: hidden; }
  .bandseg { position: absolute; top: 0; bottom: 0; }
  .bandseg.green { background: var(--green); }
  .bandseg.yellow { background: var(--yellow); }
  .bandseg.red { background: var(--red); }
  .bandseg.on { background: var(--green); }      /* boolean true (reachable / fresh) */
  .bandseg.off { background: var(--red); }        /* boolean false (down / stale) */
  .bandseg.unknown { background: #4a5260; }       /* null */
  .bandseg.neutral { background: #3a6ea5; }       /* feed/pov non-down states */
  .bandseg.offduty { background: #59606b; }       /* timer push never/disabled */
  .bands-axis { display: grid; grid-template-columns: 140px 1fr; gap: 10px; margin-top: 2px; }
  .bands-axis .ax { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted);
                    font-variant-numeric: tabular-nums; }
  .band-group, .chart-group { font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; margin: 10px 0 4px; }
  .qbadge { margin-left: 8px; font-size: 11px; font-weight: 500; color: var(--muted);
    background: rgba(255,255,255,.06); border-radius: 4px; padding: 1px 6px; }

  /* --- Charts --- */
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; padding: 12px; }
  .chart { background: #0a0c0f; border: 1px solid var(--line-2); border-radius: 8px; padding: 8px; }
  .chart .ct { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .chart .empty { font-size: 12px; color: var(--muted); padding: 24px 8px; text-align: center; }
  .uplot { width: 100%; }
  #charts-fallback { padding: 16px; color: var(--yellow); font-size: 13px; }

  /* --- Incidents --- */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--line-2); }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  td.dur { font-variant-numeric: tabular-nums; color: var(--muted); }
  .sev { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px; letter-spacing: .04em; }
  .sev.red { background: var(--red); color: #fff; }
  .sev.yellow { background: var(--yellow); color: #0a0c0f; }
  #incEmpty { padding: 16px 12px; color: var(--muted); font-size: 13px; }
  #incEmpty:not(:empty) + table { display: none; }
  /* Event annotations (#317): producer takeover, OBS stream start/stop. */
  .evt { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px; letter-spacing: .03em; background: #3a6ea5; color: #fff; white-space: nowrap; }
  .evt.takeover { background: #8b5cf6; }
  .evt.start { background: var(--green); color: #0a0c0f; }
  .evt.stop { background: var(--red); }
  #evtEmpty { padding: 16px 12px; color: var(--muted); font-size: 13px; }
  #evtEmpty:not(:empty) + table { display: none; }

  .stamp { font-size: 11px; color: var(--muted); padding: 0 12px 12px; }
</style>
</head>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const API = window.RC_API_BASE || "";
const HAS_UPLOT = (typeof uPlot !== "undefined");

// The auth cookie was set by the response that served this page, so the token in
// the URL is no longer needed — strip it from the address bar + history.
if (location.search) {
  try { history.replaceState({}, '', location.pathname); } catch (e) { /* noop */ }
}

// --- State ---
const RANGES = {
  "live": 15 * 60,
  "1h": 3600,
  "6h": 6 * 3600,
  "24h": 24 * 3600,
  "7d": 7 * 24 * 3600,
};
window.range = "live";
let liveTimer = null;
let rangeStart = 0, rangeEnd = 0;     // epoch seconds for the active fetch
const charts = {};                    // key -> uPlot instance
let eventsData = [];                  // discrete event annotations (#317), drawn as chart markers

// Event-type presentation (#317): badge class + marker line color.
function eventMeta(type) {
  if (type === "takeover") return { label: "Takeover", cls: "takeover", color: "#8b5cf6" };
  if (type === "obs_stream_start") return { label: "Stream start", cls: "start", color: "#16a34a" };
  if (type === "obs_stream_stop") return { label: "Stream stop", cls: "stop", color: "#dc2626" };
  return { label: type || "event", cls: "", color: "#3a6ea5" };
}

// uPlot plugin: draw a thin vertical line at each event ts, so the metric charts
// show WHEN a takeover / stream start-stop happened relative to the numbers.
function eventMarkersPlugin() {
  return { hooks: { draw: (u) => {
    if (!eventsData.length) return;
    const ctx = u.ctx;
    ctx.save();
    eventsData.forEach((ev) => {
      const ts = Number(ev.ts);
      if (!(ts >= rangeStart && ts <= rangeEnd)) return;
      const x = Math.round(u.valToPos(ts, "x", true)) + 0.5;
      ctx.beginPath();
      ctx.moveTo(x, u.bbox.top);
      ctx.lineTo(x, u.bbox.top + u.bbox.height);
      ctx.strokeStyle = eventMeta(ev.type).color;
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
    });
    ctx.restore();
  } } };
}
let chartResizeObs = null;            // keeps charts sized to their real column width

// --- Helpers ---
function pad2(n) { return String(n).padStart(2, "0"); }
function hms(epoch) {
  const d = new Date(epoch * 1000);
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
}
function localDateTime(epoch) {
  const d = new Date(epoch * 1000);
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()) +
         " " + pad2(d.getHours()) + ":" + pad2(d.getMinutes()) + ":" + pad2(d.getSeconds());
}
// uPlot x-axis tick label: compact + range-aware so labels never overlap in the
// narrow half-width charts. HH:MM within a day; M/D once the range spans 2+ days.
function fmtAxisTime(ts) {
  const d = new Date(ts * 1000);
  const span = (rangeEnd > rangeStart) ? (rangeEnd - rangeStart) : 0;
  if (span >= 2 * 86400) return (d.getMonth() + 1) + "/" + d.getDate();
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}
// "since"/duration humanizer -> e.g. "2h 14m", "3m 5s", "12s"
function humanize(secs) {
  secs = Math.max(0, Math.floor(secs || 0));
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (d > 0) return d + "d " + h + "h";
  if (h > 0) return h + "h " + m + "m";
  if (m > 0) return m + "m " + s + "s";
  return s + "s";
}
// Convert an epoch seconds value to the value a datetime-local input expects
// (local wall-clock, no timezone suffix).
function toLocalInput(epoch) {
  const d = new Date(epoch * 1000);
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()) +
         "T" + pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}

// --- 1. Status header ---
function renderHeader(cur, now) {
  const h = (cur && cur.health) || {};
  const badge = $("hm-badge");
  const level = (h.level === "green" || h.level === "yellow" || h.level === "red") ? h.level : "";
  badge.className = level;
  badge.textContent = level ? level.toUpperCase() : "—";

  $("hm-title").textContent = (cur && cur.event_title || "").trim();
  document.title = (cur && cur.event_title) ? (cur.event_title + " · Health Monitor") : "Health Monitor";

  const mode = (cur && cur.mode) || "—";
  $("hm-mode").textContent = mode === "qualifying" ? "QUALIFYING" : "RACE";

  const liveEl = $("hm-live");
  const live = cur && cur.live;
  if (live && live.feed) {
    liveEl.hidden = false;
    liveEl.textContent = "ON AIR · Feed " + live.feed + " · Stint " + (live.stint != null ? live.stint : "?");
  } else {
    liveEl.hidden = true;
  }

  const since = (h.since_s != null) ? ("Stable for " + humanize(h.since_s)) : "";
  $("hm-since").textContent = since;

  const ul = $("hm-reasons");
  ul.textContent = "";
  (h.reasons || []).forEach((r) => {
    const li = document.createElement("li");
    li.textContent = r;                     // XSS-safe
    ul.appendChild(li);
  });
}

// --- 3. Status bands ---
// Map a band field's state value to a CSS class.
function segClass(field, state) {
  if (state === null || state === undefined) return "unknown";
  if (field === "health_level") {
    return (state === "green" || state === "yellow" || state === "red") ? state : "unknown";
  }
  if (field === "obs_reachable") {
    // state 1|0|null  -> reachable / unreachable / unknown
    return state ? "on" : "off";
  }
  if (field === "cookies_stale") {
    // state 1|0|null  -> stale (bad) / fresh (good) / unknown
    return state ? "off" : "on";
  }
  if (field === "timer_push") {
    // Sheet write-back status: "ok"/"failed"/"never"/"disabled".
    if (state === "ok") return "on";
    if (state === "failed") return "off";
    return "offduty";                 // "never" / "disabled" -> off-duty grey
  }
  // Critical booleans: 1 = ok (green), 0 = fault (red); stream_reconnecting is inverted.
  if (field === "stream_active" || field === "funnel_ok" || field === "sheet_push_ok") {
    if (state === null || state === undefined) return "unknown";
    return state ? "on" : "off";
  }
  if (field === "stream_reconnecting") {
    if (state === null || state === undefined) return "unknown";
    return state ? "off" : "on";          // reconnecting=true is the fault
  }
  // Observational booleans: down is neutral (not an alarm).
  if (field === "tailscale_up" || field === "companion_ok") {
    if (state === null || state === undefined) return "unknown";
    return state ? "on" : "neutral";
  }
  // feed_a_state / feed_b_state / pov_state: free-form state strings.
  const s = String(state).toLowerCase();
  if (s.indexOf("down") >= 0 || s.indexOf("error") >= 0 || s.indexOf("fail") >= 0) return "off";
  if (s.indexOf("serv") >= 0 || s.indexOf("up") >= 0 || s.indexOf("on") >= 0 ||
      s.indexOf("play") >= 0 || s.indexOf("live") >= 0) return "on";
  return "neutral";
}
function stateLabel(field, state) {
  if (state === null || state === undefined) return "unknown";
  if (field === "obs_reachable") return state ? "reachable" : "unreachable";
  if (field === "cookies_stale") return state ? "stale" : "fresh";
  if (field === "stream_active") return state ? "streaming" : "not streaming";
  if (field === "stream_reconnecting") return state ? "reconnecting" : "stable";
  if (field === "funnel_ok") return state ? "up" : "down";
  if (field === "sheet_push_ok") return state ? "ok" : "failing";
  if (field === "tailscale_up") return state ? "up" : "down";
  if (field === "companion_ok") return state ? "up" : "down";
  return String(state);
}

const BAND_FIELDS = [
  ["health_level", "Health", "critical"],
  ["stream_active", "Stream active", "critical"],
  ["stream_reconnecting", "Reconnecting", "critical"],
  ["funnel_ok", "Funnel", "critical"],
  ["sheet_push_ok", "Sheet push", "critical"],
  ["feed_a_state", "Feed A", "feeds"],
  ["feed_b_state", "Feed B", "feeds"],
  ["pov_state", "POV", "feeds"],
  ["obs_reachable", "OBS", "connectivity"],
  ["tailscale_up", "Tailscale", "connectivity"],
  ["companion_ok", "Companion", "connectivity"],
  ["cookies_stale", "Cookies", "connectivity"],
  ["timer_push", "Timer sync", "connectivity"],
];
const BAND_GROUPS = [["critical", "Critical"], ["feeds", "Feeds"],
                     ["connectivity", "Connectivity"]];

function renderBands(bands, current) {
  const host = $("hm-bands");
  host.textContent = "";
  const span = Math.max(1, rangeEnd - rangeStart);
  const quality = {
    feed_a_state: current && current.feeds && current.feeds.A && current.feeds.A.quality,
    feed_b_state: current && current.feeds && current.feeds.B && current.feeds.B.quality,
    pov_state: current && current.pov && current.pov.quality,
  };

  BAND_GROUPS.forEach(([gkey, gtitle]) => {
    const rows = BAND_FIELDS.filter(([, , g]) => g === gkey);
    const hdr = document.createElement("div");
    hdr.className = "band-group"; hdr.textContent = gtitle;
    host.appendChild(hdr);

    rows.forEach(([field, label]) => {
      const segs = (bands && bands[field]) || [];
      // Skip the POV row entirely when every band's state is null.
      if (field === "pov_state" && segs.every((b) => b.state === null || b.state === undefined)) return;

      const row = document.createElement("div");
      row.className = "bandrow";
      const lab = document.createElement("div");
      lab.className = "bandlabel";
      lab.textContent = label;
      const q = quality[field];
      if (q) {
        const tag = document.createElement("span");
        tag.className = "qbadge";
        tag.textContent = q;
        lab.appendChild(tag);
      }
      const track = document.createElement("div");
      track.className = "bandtrack";

      segs.forEach((b) => {
        const from = Math.max(b.from, rangeStart);
        const to = Math.min(b.to, rangeEnd);
        if (to <= from) return;
        const seg = document.createElement("div");
        seg.className = "bandseg " + segClass(field, b.state);
        const leftPct = ((from - rangeStart) / span) * 100;
        const widthPct = ((to - from) / span) * 100;
        seg.style.left = leftPct + "%";
        seg.style.width = widthPct + "%";
        seg.title = stateLabel(field, b.state) + " — " + hms(b.from) + "–" + hms(b.to);
        track.appendChild(seg);
      });

      row.appendChild(lab);
      row.appendChild(track);
      host.appendChild(row);
    });
  });

  $("hm-axleft").textContent = hms(rangeStart);
  $("hm-axright").textContent = hms(rangeEnd);
}

// --- 4. Numeric charts ---
const NUMERIC_FIELDS = [
  ["stream_kbps", "Upstream kbps", "OBS Output"],
  ["stream_dropped_pct", "Dropped frames %", "OBS Output"],
  ["stream_congestion", "Congestion", "OBS Output"],
  ["obs_cpu_pct", "OBS CPU %", "OBS Resources"],
  ["obs_mem_mb", "OBS memory (MB)", "OBS Resources"],
  ["obs_fps", "OBS FPS", "OBS Resources"],
  ["obs_render_skipped_pct", "Render skipped %", "OBS Resources"],
  ["obs_disk_free_mb", "Disk free (MB)", "OBS Resources"],
  ["source_last_ok_age_s", "Source last-OK age (s)", "Relay / Schedule"],
  ["cookies_age_h", "Cookies age (h)", "Relay / Schedule"],
  ["sys_cpu_pct", "CPU %", "System (machine)"],
  ["sys_mem_pct", "Memory %", "System (machine)"],
  ["sys_net_up_kbps", "Net up (kbps)", "System (machine)"],
  ["sys_net_down_kbps", "Net down (kbps)", "System (machine)"],
  ["sys_disk_free_mb", "Disk free (MB)", "System (machine)"],
];

function renderCharts(series) {
  const host = $("hm-charts");
  if (!HAS_UPLOT) {
    host.hidden = true;
    $("charts-fallback").hidden = false;
    return;
  }
  // Build (or rebuild) one chart per series key. Rebuild on every fetch is
  // simplest and keeps the chart sized to its container.
  host.textContent = "";
  Object.keys(charts).forEach((k) => { try { charts[k].destroy(); } catch (e) {} delete charts[k]; });

  let lastGroup = null;
  NUMERIC_FIELDS.forEach(([key, label, group]) => {
    // Emit a group subheader when the group changes.
    if (group !== lastGroup) {
      const ghdr = document.createElement("div");
      ghdr.className = "chart-group";
      ghdr.textContent = group;
      host.appendChild(ghdr);
      lastGroup = group;
    }
    const box = document.createElement("div");
    box.className = "chart";
    const ct = document.createElement("div");
    ct.className = "ct";
    ct.textContent = label;
    box.appendChild(ct);
    host.appendChild(box);

    const s = (series && series[key]) || { t: [], v: [] };
    const t = (s.t || []).map(Number);
    const v = (s.v || []).map((x) => (x === null || x === undefined) ? null : Number(x));

    if (!t.length) {
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = "No samples in this range yet.";
      box.appendChild(e);
      return;
    }

    const width = Math.max(280, box.clientWidth - 16);
    const opts = {
      width: width,
      height: 180,
      cursor: { y: false },
      legend: { show: false },
      plugins: [eventMarkersPlugin()],     // vertical markers at event timestamps (#317)
      scales: { x: { time: true, min: rangeStart, max: rangeEnd } },
      axes: [
        { stroke: "#8b97a6", grid: { stroke: "#1c2027" }, ticks: { stroke: "#1c2027" },
          // Force a generous min gap between ticks so labels never overlap in the
          // narrow half-width charts, and render a compact range-aware label
          // (HH:MM within a day, M/D for multi-day ranges) — no stacked date row.
          space: 72, values: (u, splits) => splits.map(fmtAxisTime) },
        { stroke: "#8b97a6", grid: { stroke: "#1c2027" }, ticks: { stroke: "#1c2027" } },
      ],
      series: [
        {},
        { stroke: "#2bd66a", width: 2, fill: "rgba(43,214,106,0.10)", spanGaps: false,
          points: { show: t.length < 40 } },
      ],
    };
    try {
      charts[key] = new uPlot(opts, [t, v], box);
    } catch (e) {
      const err = document.createElement("div");
      err.className = "empty";
      err.textContent = "Chart render failed.";
      box.appendChild(err);
    }
  });

  // The CSS grid sizes the chart columns AFTER this synchronous build, so the
  // box.clientWidth measured above can be stale (over-wide) — uPlot then packs
  // too many x ticks for the real column and the labels overlap. Re-size every
  // chart to its actual laid-out width once layout settles, and keep them synced
  // when the container resizes.
  const resizeCharts = () => {
    Object.keys(charts).forEach((k) => {
      const u = charts[k];
      if (!u || !u.root || !u.root.parentNode) return;
      const w = Math.max(280, u.root.parentNode.clientWidth - 16);
      if (Math.abs(w - u.width) > 1) u.setSize({ width: w, height: 180 });
    });
  };
  requestAnimationFrame(resizeCharts);
  if (chartResizeObs) chartResizeObs.disconnect();
  chartResizeObs = new ResizeObserver(resizeCharts);
  chartResizeObs.observe(host);
}

// --- 5. Incident timeline ---
function renderIncidents(incidents) {
  const body = $("hm-incidents");
  body.textContent = "";
  const list = incidents || [];
  if (!list.length) {
    $("incEmpty").textContent = "No incidents in this range. 🎉";
    return;
  }
  $("incEmpty").textContent = "";
  // Newest first.
  list.slice().sort((a, b) => (b.ts || 0) - (a.ts || 0)).forEach((inc) => {
    const tr = document.createElement("tr");

    const when = document.createElement("td");
    when.textContent = localDateTime(inc.ts);

    const sevTd = document.createElement("td");
    const sev = document.createElement("span");
    const lvl = (inc.severity === "red" || inc.severity === "yellow") ? inc.severity : "yellow";
    sev.className = "sev " + lvl;
    sev.textContent = lvl.toUpperCase();
    sevTd.appendChild(sev);

    const what = document.createElement("td");
    what.textContent = inc.label || "";          // XSS-safe

    const dur = document.createElement("td");
    dur.className = "dur";
    dur.textContent = humanize(inc.duration_s);

    tr.append(when, sevTd, what, dur);
    body.appendChild(tr);
  });
}

// --- 6. Event annotations (#317) ---
function renderEvents(events) {
  const body = $("hm-events");
  body.textContent = "";
  const list = events || [];
  if (!list.length) {
    $("evtEmpty").textContent = "No events in this range.";
    return;
  }
  $("evtEmpty").textContent = "";
  list.slice().sort((a, b) => (b.ts || 0) - (a.ts || 0)).forEach((ev) => {
    const meta = eventMeta(ev.type);
    const tr = document.createElement("tr");

    const when = document.createElement("td");
    when.textContent = localDateTime(ev.ts);

    const typeTd = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "evt " + meta.cls;
    badge.textContent = meta.label;
    typeTd.appendChild(badge);

    const what = document.createElement("td");
    what.textContent = ev.label || "";           // XSS-safe (textContent)

    const who = document.createElement("td");
    who.textContent = ev.producer || "";          // XSS-safe

    tr.append(when, typeTd, what, who);
    body.appendChild(tr);
  });
}

// --- Fetch + render the whole dashboard ---
async function load() {
  const now = Math.floor(Date.now() / 1000);
  let from, to;
  if (window.range === "fixed") {
    from = rangeStart; to = rangeEnd;
  } else {
    const span = RANGES[window.range] || RANGES["live"];
    to = now;
    from = now - span;
  }
  rangeStart = from; rangeEnd = to;

  const url = API + "/health-monitor/data?from=" + from + "&to=" + to + "&max=2000";
  let blob;
  try {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error(r.status);
    blob = await r.json();
  } catch (e) {
    $("hm-stamp").textContent = "Failed to load data (" + e.message + "). Retrying in Live mode.";
    return;
  }

  // The server reports its own window; honor it for the band/axis math so the
  // segments line up exactly with what it returned.
  if (typeof blob.from === "number") rangeStart = blob.from;
  if (typeof blob.to === "number") rangeEnd = blob.to;

  eventsData = blob.events || [];        // set BEFORE renderCharts so markers draw
  renderHeader(blob.current || {}, blob.now);
  renderBands(blob.bands || {}, blob.current || {});
  renderCharts(blob.series || {});
  renderIncidents(blob.incidents || []);
  renderEvents(eventsData);
  $("hm-stamp").textContent = "Window " + localDateTime(rangeStart) + " → " + localDateTime(rangeEnd) +
                             " · updated " + hms(blob.now || now);
}

// --- Time-range controls ---
function setActiveButton(range) {
  document.querySelectorAll(".rangebar .btn[data-range]").forEach((b) => {
    b.classList.toggle("active", b.dataset.range === range);
  });
}
function stopLive() {
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
}
function selectRange(range) {
  window.range = range;
  setActiveButton(range);
  stopLive();
  if (range === "live") {
    load();
    liveTimer = setInterval(load, 5000);     // 5s rolling refresh
  } else {
    load();                                   // single fetch for any fixed window
  }
}

document.querySelectorAll(".rangebar .btn[data-range]").forEach((b) => {
  b.addEventListener("click", () => selectRange(b.dataset.range));
});

$("hm-apply").addEventListener("click", () => {
  const fromV = $("hm-from").value;
  const toV = $("hm-to").value;
  if (!fromV || !toV) return;
  const from = Math.floor(new Date(fromV).getTime() / 1000);
  const to = Math.floor(new Date(toV).getTime() / 1000);
  if (!(from > 0) || !(to > from)) return;
  window.range = "fixed";
  rangeStart = from; rangeEnd = to;
  setActiveButton(null);                       // no preset highlighted
  stopLive();
  load();
});

// Prefill the datetime-local inputs with the last hour for convenience.
(function () {
  const now = Math.floor(Date.now() / 1000);
  $("hm-from").value = toLocalInput(now - 3600);
  $("hm-to").value = toLocalInput(now);
})();

// Boot in Live mode.
selectRange("live");

// Recompute chart widths on resize (re-fetch keeps it simple + correct).
let resizeT = null;
window.addEventListener("resize", () => {
  if (resizeT) clearTimeout(resizeT);
  resizeT = setTimeout(load, 300);
});
</script>
