<!doctype html>
<html lang="en">
<head>
<script>
  // /console base-path shim (#216). The server replaces __RC_API_BASE__ with the
  // active mount ("/console" behind Funnel, "" at the tailnet/loopback root).
  // Patches fetch and exposes RC_API() so same-origin API calls resolve under the
  // mount; a no-op when the base is empty.
  window.RC_API_BASE = "__RC_API_BASE__";
  window.RC_OAUTH = "__RC_OAUTH__" === "1";
  window.RC_API = function (p) {
    var b = window.RC_API_BASE || "";
    if (!b || typeof p !== "string" || p.charAt(0) !== "/") return p;
    if (p.indexOf(b + "/") === 0 || p === b) return p;   // already prefixed
    return b + p;
  };
  (function () {
    var _f = window.fetch;
    window.fetch = function (u, o) { return _f(window.RC_API(u), o); };
  })();
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Race Console</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0c0f'/%3E%3Cpath d='M23 11a7 7 0 1 0 0 10' fill='none' stroke='%232bd66a' stroke-width='3.4' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 16px/1.4 system-ui, sans-serif; background: #0e1116; color: #e6e6e6; }
  header { padding: 20px 24px; border-bottom: 1px solid #232a33; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  #logo { height: 34px; width: auto; object-fit: contain; flex-shrink: 0; }
  #league { margin: 0; font-size: 20px; }
  .evt { color: #8b97a6; font-size: 13px; margin-top: 2px; }
  .who { color: #8b97a6; font-size: 13px; flex-shrink: 0; }
  main { padding: 24px; display: grid; gap: 14px; max-width: 560px; }
  a.card { display: block; padding: 16px 18px; background: #161b22; border: 1px solid #232a33;
           border-radius: 10px; color: #e6e6e6; text-decoration: none; }
  a.card:hover { border-color: #3b82f6; }
  a.card .t { font-weight: 600; }
  a.card .d { color: #8b97a6; font-size: 13px; margin-top: 2px; }
  .empty { color: #8b97a6; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img id="logo" alt="" hidden>
    <div>
      <h1 id="league">Race Console</h1>
      <div class="evt" id="evt"></div>
    </div>
  </div>
  <div class="who" id="who">…</div>
</header>
<main id="menu"></main>
<script>
  function card(href, title, desc) {
    return '<a class="card" href="' + href + '"><div class="t">' + title +
           '</div><div class="d">' + desc + '</div></a>';
  }
  fetch('/whoami').then(function (r) {
    if (!r.ok) throw new Error('unauthorized');   // 401/403 -> not signed in (login branch)
    return r.json();
  }).then(function (me) {
    var roles = me.roles || [];
    document.getElementById('who').textContent =
      me.subject + (roles.length ? ' — ' + roles.join(', ') : ' — viewer');
    var out = [];
    out.push(card(RC_API('/cockpit'), 'Commentator Cockpit', 'Program monitor, tally, chat, stint links'));
    if (roles.indexOf('director') !== -1)
      out.push(card(RC_API('/panel'), 'Director Panel', 'Feed, schedule, timer, HUD & submissions control'));
    var menu = document.getElementById('menu');
    function render() {
      menu.innerHTML = out.join('') ||
        '<div class="empty">No surfaces are available for your role.</div>';
    }
    render();
    if (roles.indexOf('director') !== -1) {
      // Companion buttons over Funnel (#236): only when a new-enough Companion is up.
      fetch(RC_API('/buttons/health')).then(function (r) { return r.json(); }).then(function (h) {
        if (h.ok) {
          out.push('<a class="card" target="_blank" rel="noopener" href="' +
            RC_API('/buttons/tablet') + '"><div class="t">Web Buttons</div>' +
            '<div class="d">The broadcast control buttons, in your browser</div></a>');
        } else if (h.reachable) {
          out.push('<div class="card" style="opacity:.5"><div class="t">Web Buttons</div>' +
            '<div class="d">Unavailable — the button board needs updating</div></div>');
        }
        render();
      }).catch(function () { /* leave the menu as rendered */ });
    }
  }).catch(function () {
    document.getElementById('who').textContent = 'not signed in';
    var menu = document.getElementById('menu');
    if (window.RC_OAUTH) {
      menu.innerHTML = '<a class="card" href="' + RC_API('/login') +
        '"><div class="t">Login with Discord</div><div class="d">' +
        'Sign in to reach your console</div></a>';
    } else {
      menu.innerHTML =
        '<div class="empty">Could not load your access. Check your link.</div>';
    }
  });
  fetch(RC_API('/status')).then(function (r) { return r.json(); }).then(function (s) {
    var name = (s.league && s.league.name) || '';
    if (name) document.getElementById('league').textContent = name;
    var evt = s.event_title || '';
    if (evt) document.getElementById('evt').textContent = evt;
  }).catch(function () {});
  (function () {
    var img = document.getElementById('logo');
    img.onload = function () { img.hidden = false; };
    img.onerror = function () { img.hidden = true; };
    img.src = RC_API('/logo');
  })();
</script>
</body>
</html>
