<!doctype html>
<html lang="en">
<head>
<script>
  // /console base-path shim (#216). The server replaces __RC_API_BASE__ with the
  // active mount ("/console" behind Funnel, "" at the tailnet/loopback root).
  // Patches fetch and exposes RC_API() so same-origin API calls resolve under the
  // mount; a no-op when the base is empty.
  window.RC_API_BASE = "__RC_API_BASE__";
  window.RC_API = function (p) {
    var b = window.RC_API_BASE || "";
    if (!b || typeof p !== "string" || p.charAt(0) !== "/") return p;
    if (p.indexOf(b + "/") === 0 || p === b) return p;   // already prefixed
    return b + p;
  };
  (function () {
    var _f = window.fetch;
    window.fetch = function (u, o) { return _f(window.RC_API(u), o); };
  })();
</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Commentator Cockpit</title>
<!-- Inline "T" (Tally) favicon drawn as rects so it renders without a font; dark tile + live-green letter to match the console/panel theme. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0c0f'/%3E%3Crect x='7' y='8.5' width='18' height='3.8' rx='1.5' fill='%232bd66a'/%3E%3Crect x='14.1' y='8.5' width='3.8' height='16.5' rx='1.5' fill='%232bd66a'/%3E%3C/svg%3E">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.4 system-ui, sans-serif; background: #0b0d10; color: #e8eaed; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #14171c; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .02em; }
  a.back { display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
           color: #e8eaed; background: #1b1f25; border: 1px solid #232830; border-radius: 8px;
           padding: 6px 10px; font-size: 13px; font-weight: 600; }
  a.back:hover { border-color: #3b82f6; }
  #who { opacity: .7; font-size: 13px; }
  #eventTitle { font-size: 13px; font-weight: 600; color: #ffb454; }
  #eventTitle:not(:empty)::before { content: "· "; opacity: .5; font-weight: 400; }
  .wrap { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; padding: 12px; }
  @media (max-width: 820px) { .wrap { grid-template-columns: 1fr; } }
  .card { background: #14171c; border: 1px solid #232830; border-radius: 10px; overflow: hidden; }
  .tally { margin: 12px; padding: 18px; text-align: center; font-weight: 800; font-size: 26px;
           letter-spacing: .04em; border-radius: 10px; transition: background .2s; }
  .tally.onair { background: #c1121f; color: #fff; box-shadow: 0 0 0 3px #ff4d5e inset; }
  .tally.next  { background: #1d4ed8; color: #fff; }
  .tally.idle  { background: #1b1f25; color: #9aa0a6; font-size: 18px; }
  .sub { font-size: 13px; font-weight: 500; opacity: .9; margin-top: 4px; }
  #program { width: 100%; display: block; background: #000; aspect-ratio: 16/9; object-fit: contain; }
  .progwrap { position: relative; }
  .progwrap .badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.6);
                     padding: 2px 8px; border-radius: 6px; font-size: 12px; }
  #timer { padding: 14px; text-align: center; }
  #timer .t { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #chat { display: flex; flex-direction: column; height: 340px; }
  #chatlog { flex: 1; overflow-y: auto; padding: 8px 10px; }
  #chatlog .msg { margin-bottom: 6px; }
  #chatlog .u { font-weight: 600; color: #8ab4f8; }
  .chatbar { display: flex; gap: 6px; padding: 8px; border-top: 1px solid #232830; }
  .chatbar input { flex: 1; padding: 8px; background: #0b0d10; color: #e8eaed;
                   border: 1px solid #2a3038; border-radius: 6px; }
  .chatbar button { padding: 8px 12px; background: #1d4ed8; color: #fff; border: 0;
                    border-radius: 6px; cursor: pointer; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; opacity: .7;
       margin: 0; padding: 10px 12px; border-bottom: 1px solid #232830; }
  .submit { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .submit label { font-size: 12px; opacity: .8; display: flex; flex-direction: column; gap: 4px; }
  .submit select, .submit input { padding: 8px; background: #0b0d10; color: #e8eaed;
                                  border: 1px solid #2a3038; border-radius: 6px; font: inherit; }
  .submit button { padding: 9px 12px; background: #1d4ed8; color: #fff; border: 0;
                   border-radius: 6px; cursor: pointer; font-weight: 600; }
  .submit button:disabled { opacity: .5; cursor: default; }
  .submsg { font-size: 13px; min-height: 1em; }
  .submsg.ok { color: #34d399; }
  .submsg.err { color: #f87171; }
  #subPending:empty { display: none; }
  #subPending { display: flex; flex-direction: column; gap: 4px; }
  .subpend { font-size: 13px; background: #1b1f25; border: 1px solid #2a3038;
             border-radius: 6px; padding: 6px 8px; color: #cbd1d6; }
  .submit .hint { font-size: 12px; opacity: .6; line-height: 1.3; }
  /* --- Director cues (#243) --- */
  /* Amber + pulse so a director cue is unmistakable AND distinct from the red
     "YOU ARE ON AIR" tally right below it (same red made the cue blend in). */
  .cue-critical { position: sticky; top: 0; z-index: 100;
                  display: flex; align-items: center; justify-content: center;
                  gap: 16px; flex-wrap: wrap;
                  background: #ffb300; color: #1a1200;
                  font-size: 24px; font-weight: 800; letter-spacing: .02em;
                  padding: 16px 18px; text-align: center;
                  border-bottom: 4px solid #ff7a00;
                  animation: cuePulse 1.1s ease-in-out infinite; }
  /* display:flex above overrides the [hidden] attribute's display:none, so
     re-assert it explicitly — otherwise the empty bar lingers with no cue. */
  .cue-critical[hidden] { display: none; }
  @keyframes cuePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,179,0,0), 0 6px 20px rgba(0,0,0,.5); }
    50%      { box-shadow: 0 0 0 4px rgba(255,179,0,.85), 0 6px 24px rgba(0,0,0,.6); }
  }
  .cue-critical .cue-label { font-size: 13px; font-weight: 900;
                             letter-spacing: .12em; text-transform: uppercase;
                             background: #1a1200; color: #ffb300;
                             padding: 3px 10px; border-radius: 999px; }
  .cue-critical button { padding: 8px 18px;
                         background: #1a1200; color: #ffb300;
                         border: 0; border-radius: 6px; cursor: pointer;
                         font-weight: 800; font-size: 15px; }
  .cue-critical button:hover { background: #000; }
  @media (prefers-reduced-motion: reduce) { .cue-critical { animation: none; } }
  .cue-toasts { position: fixed; bottom: 18px; right: 18px;
                display: flex; flex-direction: column; gap: 8px;
                z-index: 200; max-width: 340px; }
  .cue-toast { background: #1d4ed8; color: #fff;
               padding: 10px 14px; border-radius: 8px;
               font-size: 14px; font-weight: 600;
               box-shadow: 0 4px 12px rgba(0,0,0,.5);
               animation: cue-fadein .25s ease; }
  @keyframes cue-fadein { from { opacity: 0; transform: translateY(8px); }
                          to   { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<header>
  <a class="back" id="backConsole" href="#" hidden aria-label="Back to Console">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Console
  </a>
  <h1>Commentator Cockpit</h1>
  <span id="eventTitle"></span>
  <span id="who"></span>
</header>
<script>
  // Show the "← Console" back link only when served under the /console mount
  // (RC_API_BASE set); at the tailnet root (/cockpit) there is no launcher to return to.
  (function () {
    var b = window.RC_API_BASE;
    if (b) { var a = document.getElementById('backConsole'); a.href = b; a.hidden = false; }
  })();
</script>

<div id="cueCritical" class="cue-critical" hidden></div>
<div id="cueToasts" class="cue-toasts"></div>

<div id="tally" class="tally idle">…</div>

<div class="wrap">
  <div>
    <div class="card progwrap">
      <span class="badge">PROGRAM</span>
      <img id="program" alt="program monitor">
    </div>
  </div>
  <div>
    <div class="card"><h2>Race timer</h2><div id="timer"><div class="t">—</div></div></div>
    <div class="card" id="submitCard" hidden style="margin-top:12px;">
      <h2>Submit your stream link</h2>
      <div class="submit">
        <label>Your stint
          <select id="subStint"></select>
        </label>
        <input id="subUrl" placeholder="youtube.com/watch?v=… · twitch.tv/<channel> · UC…">
        <button id="subBtn">Submit for approval</button>
        <div id="subMsg" class="submsg"></div>
        <div id="subPending"></div>
        <div class="hint">Goes to the director for approval before it can go on
          air — nothing you submit goes live automatically. YouTube or Twitch only.</div>
      </div>
    </div>
    <div class="card" style="margin-top:12px;">
      <h2>Crew chat</h2>
      <div id="chat">
        <div id="chatlog"></div>
        <div class="chatbar">
          <input id="chatin" placeholder="Message the crew…" maxlength="500">
          <button id="chatsend">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

// The auth cookie was set by the response that served this page, so the token in
// the URL is no longer needed — strip it from the address bar + browser history
// (keeps it out of screen-shares / shoulder-surfing). Sub-requests use the cookie.
if (location.search) {
  try { history.replaceState({}, '', location.pathname); } catch (e) { /* noop */ }
}

async function j(path) {
  const r = await fetch(path, { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// --- Tally ---
function renderTally(d) {
  // Read-only event title for talent (#207). textContent -> XSS-safe, like #who.
  const title = (d.event_title || '').trim();
  $('eventTitle').textContent = title;
  document.title = title ? (title + ' · Commentator Cockpit') : 'Commentator Cockpit';
  $('who').textContent = d.me ? '· ' + d.me + (d.mode === 'qualifying' ? ' · QUALI' : '') : '';
  const el = $('tally');
  if (d.on_air) {
    el.className = 'tally onair';
    el.innerHTML = '';
    el.appendChild(document.createTextNode('YOU ARE ON AIR'));
    if (d.up_next) {                       // also surface the next own stint
      const sub = document.createElement('div');
      sub.className = 'sub';
      sub.textContent = 'then: ' + d.up_next.stint + ' · in ' + d.up_next.in_n +
        ' handover' + (d.up_next.in_n === 1 ? '' : 's');
      el.appendChild(sub);
    }
  } else if (d.up_next) {
    el.className = 'tally next';
    const inN = d.up_next.in_n;
    el.innerHTML = '';
    el.appendChild(document.createTextNode('UP NEXT · ' + d.up_next.stint));
    const sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = 'in ' + inN + ' handover' + (inN === 1 ? '' : 's');
    el.appendChild(sub);
  } else if (d.scheduled) {
    el.className = 'tally idle';
    el.textContent = 'Standby — not upcoming';
  } else {
    el.className = 'tally idle';
    el.textContent = 'Standby — not scheduled';
  }
}
async function pollTally() {
  try { const d = await j('/cockpit/data'); renderTally(d); renderSubmit(d); }
  catch (e) { /* transient */ }
  setTimeout(pollTally, 2000);
}

// --- Stream-link submission (#193) ---
// Show the form only when the relay offers submissions AND this commentator has
// at least one stint. Refresh the stint picker without clobbering an open menu.
let subStintUrls = {};       // stint label -> the commentator's own current link
function renderSubmit(d) {
  const card = $('submitCard'), sel = $('subStint');
  const stints = (d.submit_enabled && d.my_stints) ? d.my_stints : [];
  subStintUrls = {};
  stints.forEach(s => { subStintUrls[s.stint] = s.url || ''; });
  card.hidden = stints.length === 0;
  renderPending(d.my_pending || []);          // live status (clears on approve/reject)
  if (card.hidden || sel === document.activeElement) return;
  const sig = JSON.stringify(stints.map(s => s.stint + ':' + s.has_link));
  if (sel.dataset.sig !== sig) {
    const cur = sel.value;
    sel.innerHTML = stints.map(s =>
      `<option value="${s.stint}">${s.stint}${s.has_link ? ' (replace)' : ''}</option>`).join('');
    sel.dataset.sig = sig;
    if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
  }
  // Pre-fill the field with the selected stint's current link the first time the
  // form appears — but never clobber an in-progress edit (focused / already typed).
  if (!sel.dataset.prefilled && sel.value &&
      document.activeElement !== $('subUrl') && !$('subUrl').value) {
    $('subUrl').value = subStintUrls[sel.value] || '';
    sel.dataset.prefilled = '1';
  }
}
// Live list of the commentator's own pending submissions. An entry disappears
// (next poll) once the director approves or rejects it — so the cockpit reflects
// the outcome instead of leaving a stale "submitted" message. Carries no URL.
function renderPending(pend) {
  const box = $('subPending');
  box.textContent = '';
  pend.forEach(p => {
    const row = document.createElement('div');
    row.className = 'subpend';
    row.textContent = '⏳ ' + (p.stint || '?') + ' — awaiting director approval';
    box.appendChild(row);
  });
}
async function submitLink() {
  const btn = $('subBtn'), msg = $('subMsg'), url = $('subUrl').value.trim();
  const stint = $('subStint').value;
  msg.className = 'submsg';
  if (!url) { msg.className = 'submsg err'; msg.textContent = 'Enter a stream URL.'; return; }
  btn.disabled = true;
  try {
    const r = await fetch('/cockpit/submit', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, stint }) });
    const d = await r.json();
    if (d.error) { msg.className = 'submsg err'; msg.textContent = d.error; }
    else {
      msg.className = 'submsg ok';
      msg.textContent = 'Submitted ✓ — see status below.';
      $('subUrl').value = '';
      pollTally();                 // refresh the live pending list immediately
      // the ack is a one-shot; the live list below is the lasting status
      setTimeout(() => { if (msg.classList.contains('ok')) {
        msg.textContent = ''; msg.className = 'submsg'; } }, 5000);
    }
  } catch (e) { msg.className = 'submsg err'; msg.textContent = 'Submit failed — try again.'; }
  finally { btn.disabled = false; }
}

// --- Program monitor (JPEG stills, cache-busted) ---
function pollProgram() {
  const img = $('program');
  const next = new Image();
  next.onload = () => { img.src = next.src; setTimeout(pollProgram, 1500); };
  next.onerror = () => setTimeout(pollProgram, 3000);
  next.src = RC_API('/cockpit/program') + '?_=' + Date.now();
}

// --- Timer (mirrors the broadcast HUD clock in src/obs/hud.html) ---
let timerState = null, clockOffset = 0;   // serverNow - clientNow at last poll
function fmtClock(s) {
  s = Math.max(0, Math.ceil(s));
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), x = s % 60;
  return `${h}:${String(m).padStart(2, '0')}:${String(x).padStart(2, '0')}`;
}
function renderTimer() {
  const el = $('timer').querySelector('.t');
  if (!timerState || !timerState.visible) { el.textContent = '—'; return; }
  if (timerState.end === null) {
    // not started yet (prestart): show the planned race duration
    const s = (timerState.remaining_s ?? null) !== null ? timerState.remaining_s
                                                         : timerState.duration_s;
    el.textContent = fmtClock(s);
  } else {
    const remaining = timerState.end - (Date.now() / 1000 + clockOffset);
    el.textContent = remaining > 0 ? fmtClock(remaining) : '0:00:00';
  }
}
async function pollTimer() {
  try {
    const d = await j('/cockpit/timer');
    if (!d.error) { timerState = d; clockOffset = d.server_now - Date.now() / 1000; }
  } catch (e) { /* keep last good state on transient errors */ }
  setTimeout(pollTimer, 5000);   // re-sync with the server every 5 s
}
setInterval(renderTimer, 250);   // smooth local countdown between polls

// --- Chat ---
async function pollChat() {
  try {
    const d = await j('/cockpit/chat/data');
    const log = $('chatlog');
    log.textContent = '';
    (d.messages || []).forEach(msg => {
      const row = document.createElement('div');
      row.className = 'msg';
      const u = document.createElement('span');
      u.className = 'u'; u.textContent = (msg.user || 'Crew') + ': ';
      row.appendChild(u);
      row.appendChild(document.createTextNode(msg.text || ''));  // XSS-safe
      log.appendChild(row);
    });
    log.scrollTop = log.scrollHeight;
  } catch (e) { /* transient */ }
  setTimeout(pollChat, 3000);
}
async function sendChat() {
  const inp = $('chatin');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  try {
    await fetch('/cockpit/chat/send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })           // user is forced server-side
    });
    pollChat();
  } catch (e) { /* transient */ }
}
$('chatsend').addEventListener('click', sendChat);
$('chatin').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
$('subBtn').addEventListener('click', submitLink);
$('subUrl').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitLink(); });
// Switching to another of your stints shows THAT stint's current link.
$('subStint').addEventListener('change', () => {
  $('subUrl').value = subStintUrls[$('subStint').value] || '';
});

// --- Director cues (#243) ---
const _shownInfo = new Set();   // info cue ids already toasted (avoid re-toasting each poll)

async function ackCue(id) {
  try {
    await fetch('/cockpit/cues/ack', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }) });
  } catch (e) { /* next poll re-shows the banner if the ack failed */ }
  pollCues();
}

async function pollCues() {
  let cues = [];
  try {
    const d = await j('/cockpit/cues');
    cues = d.cues || [];
  } catch (e) { setTimeout(pollCues, 3000); return; }
  // Critical: the most recent active one as a sticky banner with Acknowledge.
  const crit = cues.filter(c => c.level === 'critical');
  const banner = $('cueCritical');
  if (crit.length) {
    const c = crit[crit.length - 1];
    banner.textContent = '';
    const label = document.createElement('span');
    label.className = 'cue-label'; label.textContent = '⚠ Director';
    const txt = document.createElement('span');
    txt.className = 'cue-text'; txt.textContent = c.text;   // XSS-safe
    const btn = document.createElement('button');
    btn.type = 'button'; btn.textContent = 'Acknowledge';
    btn.addEventListener('click', () => ackCue(c.id));
    banner.append(label, txt, btn);
    banner.hidden = false;
  } else {
    banner.hidden = true; banner.textContent = '';
  }
  // Info: show each new one once as an auto-fading toast.
  cues.filter(c => c.level === 'info' && !_shownInfo.has(c.id)).forEach(c => {
    _shownInfo.add(c.id);
    const t = document.createElement('div');
    t.className = 'cue-toast'; t.textContent = c.text;
    $('cueToasts').appendChild(t);
    setTimeout(() => t.remove(), 8000);
  });
  setTimeout(pollCues, 3000);
}

pollTally(); pollProgram(); pollTimer(); pollChat(); pollCues();
</script>
</body>
</html>
