<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>GT Racing — Intermission</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  }

  body {
    position: relative;
    background: radial-gradient(ellipse at 50% 40%, #161b24 0%, #0e131a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Top accent bar */
  .bar-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: #2aa7c7;
  }

  /* Bottom accent bar */
  .bar-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 8px;
    background: #2aa7c7;
  }

  /* Centered content column — nudged slightly left to stay clear of the
     right-side chat panel (~460 px wide at right:64px) */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    position: relative;
    transform: translateX(-80px);
  }

  /* SVG motion-mark */
  .motion-mark {
    display: block;
  }

  /* Headline */
  .headline {
    font-size: 118px;
    font-style: italic;
    font-weight: 800;
    color: #eef2f6;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1;
    white-space: nowrap;
  }

  /* Subline */
  .subline {
    font-size: 34px;
    font-weight: 700;
    color: #2aa7c7;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    line-height: 1;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <div class="bar-top"></div>
  <div class="bar-bottom"></div>

  <div class="content">

    <!-- /// motion-mark: three skewed parallelogram slashes -->
    <svg class="motion-mark"
         width="196" height="140"
         viewBox="0 0 196 140"
         xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true">
      <!-- Each slash is a skewed rectangle (parallelogram).
           Skew angle ~22 deg: top-right corner shifted 52 px right relative to bottom-right.
           Slash width 38 px, gap 12 px, height 140 px. -->
      <polygon points="52,0  90,0  38,140  0,140"  fill="#eef2f6"/>
      <polygon points="102,0 140,0  88,140  50,140" fill="#eef2f6"/>
      <polygon points="152,0 190,0 138,140 100,140" fill="#eef2f6"/>
    </svg>

    <span class="headline">Intermission</span>
    <span class="subline">We'll be right back</span>

  </div>

</body>
</html>
