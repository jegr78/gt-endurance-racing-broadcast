# Ruff lint config — catches the issue classes GitHub code scanning (CodeQL)
# flags, BEFORE they reach a PR. Run locally: python3 tools/lint.py [--fix]
# (needs `ruff` on PATH: brew/winget install ruff). CI runs the same check.
#
# The rule set is deliberately narrow: this codebase intentionally uses compact
# one-liners (`try: ... except OSError: pass` with an explanatory comment — the
# CodeQL convention), semicolons and grouped imports, so style rules (E1/E2/
# E4/E7, line length) stay OFF. S110 (try/except/pass) also stays off: it
# cannot see the explanatory comments CodeQL accepts and would re-flag every
# documented block. CodeQL remains the deep security scanner (taint tracking);
# ruff is the fast mechanical gate.
target-version = "py311"

# dist/, runtime/, incoming/ are covered by .gitignore (respected by default).

[lint]
select = [
    "F",       # pyflakes: unused imports/variables, undefined names, f-string bugs
    "E9",      # syntax / io errors
    "PLE",     # pylint errors (e.g. bad string formatting, nonlocal misuse)
    "B",       # bugbear: mutable defaults, loop-var capture, useless expressions
    "SIM115",  # open() without a context manager  (CodeQL py/file-not-closed)
    "RET503",  # missing explicit return at end of value-returning function
               #                                   (CodeQL py/mixed-returns)
]
