name: CodeQL

# Static security analysis (free for public repositories). Scans the Python
# sources for vulnerabilities and unsafe patterns. Results show up under the
# repo's Security > Code scanning tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"  # weekly catch-all (Mondays), independent of pushes

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload CodeQL results
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
