name: CodeQL

# Static security analysis (free for public repositories). Scans the Python
# sources for vulnerabilities and unsafe patterns. Results show up under the
# repo's Security > Code scanning tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "epic/**"]   # gate sub-PRs targeting a long-lived epic branch
  schedule:
    - cron: "27 4 * * 1"  # weekly catch-all (Mondays), independent of pushes

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required to upload CodeQL results
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4
