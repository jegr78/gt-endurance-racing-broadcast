name: CI

# Build/test gate. Runs the stdlib unit tests and the build self-verify on
# every push to main and every pull request. Pure Python, no external runtime
# deps (yt-dlp/streamlink/ffmpeg/deno are not needed for tests or the build).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest  # Linux = 1x minutes; never use macOS (10x) for this
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests (stdlib, each file is a runnable script)
        run: |
          for t in tests/test_pov.py tests/test_hud.py tests/test_preflight.py tests/test_standby.py tests/test_media.py tests/test_graphics.py; do
            echo "::group::$t"
            python3 "$t"
            echo "::endgroup::"
          done

      - name: Build distributable + self-verify (tokenization, blanked password, no secrets)
        run: python3 tools/build.py
