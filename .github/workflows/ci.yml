name: CI

# Test gate. Runs the stdlib test suite on all three target OSes (the iro
# binary ships for Windows/macOS/Linux) across supported Python versions, plus
# the build self-verify (tokenization, blanked password, no secrets shipped).
# Public repo: Actions minutes are free, macOS runners included.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    # Fast mechanical gate (ruff.toml mirrors the CodeQL alert classes:
    # unclosed files, mixed returns, unused imports, bugbear). CodeQL stays
    # the deep security scanner; this catches the rest before review.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.16"   # pinned: new ruff rules must not break CI silently

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite (stdlib, each file is a runnable script)
        run: python tools/run-tests.py

      - name: Build distributable + self-verify (tokenization, blanked password, no secrets)
        run: python tools/build.py
