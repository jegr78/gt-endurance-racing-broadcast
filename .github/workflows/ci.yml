name: CI

# Test gate. Runs the stdlib test suite + build self-verify (tokenization,
# blanked password, no secrets shipped). Two orthogonal axes, NOT a full cross
# product: the Python-version axis (3.12/3.13) runs on ubuntu only (fast/free,
# catches version-specific stdlib drift), while the OS axis (Windows/macOS —
# the binary ships for all three) runs on the pinned ship version (3.12) only,
# catching OS-specific path/process bugs (#97). macOS runners are the slow,
# scarce ones, so they get exactly one job, not three. NB: the matrix job names
# below ("test (<os>, <ver>)") are the ruleset's required status checks — if you
# change a combo, update Protect main's required checks to match or PRs deadlock.
on:
  push:
    branches: [main, "epic/**"]
  pull_request:
    branches: [main, "epic/**"]   # gate sub-PRs targeting a long-lived epic branch

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    # Fast mechanical gate (ruff.toml mirrors the CodeQL alert classes:
    # unclosed files, mixed returns, unused imports, bugbear). CodeQL stays
    # the deep security scanner; this catches the rest before review.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          version: "0.15.16"   # pinned: new ruff rules must not break CI silently

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.12", "3.13"]
        # Full version sweep on ubuntu only; the slow Windows/macOS runners run
        # just the pinned ship version (3.12). 4 jobs instead of a 6-job cross
        # product (and one macOS job, not three). exclude (not include) keeps the
        # job names as "test (<os>, <ver>)" so the ruleset's required checks match.
        exclude:
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run test suite (stdlib, each file is a runnable script)
        run: python tools/run-tests.py

  build:
    # Build self-verify (tokenization, blanked password, no secrets shipped, no
    # shell scripts). OS-independent — it asserts the assembled dist/ contents,
    # not runtime behaviour — so one ubuntu job suffices instead of re-running it
    # inside every test-matrix job. A required check (gates merges like the tests).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Build distributable + self-verify (tokenization, blanked password, no secrets)
        run: python tools/build.py

  binary-smoke:
    # CI must exercise everything the release pipeline exercises: release.yml
    # builds the PyInstaller binary and runs the build-binary smoke test, so a
    # PR that breaks either (e.g. a removed CLI flag still passed by the smoke)
    # must go red here — not at the v* tag. One OS is enough: the smoke covers
    # frozen dispatch + bundled data, which drift OS-independently; the release
    # still builds all three.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Build + smoke-test the binary (same step as release.yml)
        run: python tools/build-binary.py --version ci-smoke

  e2e:
    # Integration outer loop: stand up the relay + Control Center from src/ and
    # assert the live HTTP surface (cockpit auth gating, tally, chat round-trip,
    # /api/console/status, …) — the end-to-end behaviour run-tests.py's unit
    # suite can't cover. Synthetic mode only: no real Sheet/cookies/OBS/Tailscale
    # and no yt-dlp/streamlink/ffmpeg/deno (the relay's feed pulls are best-effort
    # daemon threads, so the control server still comes up). Stdlib only — NO
    # --playwright, so the optional rendered checks always skip here. One OS is
    # enough; the synthetic surface is OS-independent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Run the synthetic e2e harness (relay + Control Center bring-up)
        run: python tools/e2e.py
