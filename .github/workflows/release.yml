name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # dispatched by release-please.yml with --ref <tag>
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Create the GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes || true
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: racecast-windows.zip
            built: dist/bin/racecast.exe
            binary: racecast.exe
            built_ui: dist/bin/racecast-ui.exe
            binary_ui: racecast-ui.exe
          - os: macos-latest
            asset: racecast-macos.tar.gz
            built: dist/bin/racecast
            binary: racecast
            built_ui: dist/bin/racecast-ui.app
            binary_ui: racecast-ui.app
          - os: ubuntu-latest
            asset: racecast-linux.tar.gz
            built: dist/bin/racecast
            binary: racecast
            built_ui: dist/bin/racecast-ui
            binary_ui: racecast-ui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - name: Run test suite
        run: python tools/run-tests.py
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Build + smoke-test the binary
        run: python tools/build-binary.py --version "${{ github.ref_name }}"
      - name: Package the release asset (binaries + .env.example)
        run: |
          mkdir staging
          cp -R "${{ matrix.built }}" "staging/${{ matrix.binary }}"
          cp -R "${{ matrix.built_ui }}" "staging/${{ matrix.binary_ui }}"
          cp .env.example staging/
          cd staging
          case "${{ matrix.asset }}" in
            *.zip)    python -m zipfile -c "../${{ matrix.asset }}" "${{ matrix.binary }}" "${{ matrix.binary_ui }}" .env.example ;;
            *.tar.gz) tar czf "../${{ matrix.asset }}" "${{ matrix.binary }}" "${{ matrix.binary_ui }}" .env.example ;;
            *)        echo "Unknown asset format: ${{ matrix.asset }}"; exit 1 ;;
          esac
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --clobber
