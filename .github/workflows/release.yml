name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create the GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes || true
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: iro-windows.zip
            built: dist/bin/iro.exe
            binary: iro.exe
          - os: macos-latest
            asset: iro-macos.tar.gz
            built: dist/bin/iro
            binary: iro
          - os: ubuntu-latest
            asset: iro-linux.tar.gz
            built: dist/bin/iro
            binary: iro
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run test suite
        run: python tools/run-tests.py
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Build + smoke-test the binary
        run: python tools/build-binary.py --version "${{ github.ref_name }}"
      - name: Package the release asset (binary + .env.example)
        run: |
          mkdir staging
          cp "${{ matrix.built }}" "staging/${{ matrix.binary }}"
          cp .env.example staging/
          cd staging
          case "${{ matrix.asset }}" in
            *.zip)    python -m zipfile -c "../${{ matrix.asset }}" "${{ matrix.binary }}" .env.example ;;
            *.tar.gz) tar czf "../${{ matrix.asset }}" "${{ matrix.binary }}" .env.example ;;
          esac
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.asset }}" --clobber
