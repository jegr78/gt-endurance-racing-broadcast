name: Secret scan

# Defense-in-depth secret scan on top of GitHub's native push protection.
# Catches accidentally committed secrets (.env values, tokens, cookies) in a
# pull request before they can be merged. Uses the gitleaks binary directly to
# avoid the org-license requirement of the wrapper action.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "epic/**"]   # gate sub-PRs targeting a long-lived epic branch

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0  # full history so the git scan can inspect all commits

      - name: Install gitleaks (pinned + checksum-verified)
        # Pin an exact version and verify its sha256 (#100/#9): a compromised
        # upstream 'latest' release would otherwise run in CI with this job's
        # token. Bump VER + SHA256 together (from the release's checksums.txt);
        # the linux_x64 asset name has been stable across 8.x.
        env:
          VER: "8.30.1"
          SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          echo "Installing gitleaks ${VER}"
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git --no-banner --redact --verbose .
