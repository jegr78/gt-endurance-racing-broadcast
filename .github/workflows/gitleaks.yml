name: Secret scan

# Defense-in-depth secret scan on top of GitHub's native push protection.
# Catches accidentally committed secrets (.env values, tokens, cookies) in a
# pull request before they can be merged. Uses the gitleaks binary directly to
# avoid the org-license requirement of the wrapper action.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the git scan can inspect all commits

      - name: Install gitleaks (latest release)
        run: |
          set -euo pipefail
          tag=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)
          ver="${tag#v}"
          echo "Installing gitleaks ${ver}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/${tag}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git --no-banner --redact --verbose .
